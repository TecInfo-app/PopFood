<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopFood - Clientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="p-4 bg-gray-100 min-h-screen">

<div id="app-container" class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-5xl mx-auto my-8">
    <div class="flex items-center gap-4 mb-6">
        <a href="index.html" class="text-gray-500 hover:text-gray-800">
            <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12" /></svg>
        </a>
        <h1 class="text-3xl font-bold">Clientes</h1>
    </div>

    <div id="clients-list" class="space-y-4">
        <p class="text-center text-gray-500">Carregando...</p>
    </div>
</div>

<!-- Modal de Detalhes -->
<div id="clientModal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 id="clientName" class="text-2xl font-bold"></h3>
            <button id="closeModalBtn" class="text-gray-500 hover:text-gray-800">✕</button>
        </div>
        <div class="mb-6">
            <p><strong>Telefone:</strong> <span id="clientPhone"></span></p>
            <p><strong>Endereço:</strong> <span id="clientAddress"></span></p>
            <p><strong>Email:</strong> <span id="clientEmail"></span></p>
            <p><strong>Total pedidos:</strong> <span id="clientOrderCount"></span></p>
        </div>
        <h4 class="text-xl font-bold mb-4">Histórico de Pedidos</h4>
        <div id="clientOrders" class="space-y-4"></div>
    </div>
</div>

<script type="module">
    import { db, auth, collection, getDocs, query, orderBy, COLLECTIONS } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let clients = new Map();
    let orders = [];

    const clientsList = document.getElementById('clients-list');
    const clientModal = document.getElementById('clientModal');
    const closeModalBtn = document.getElementById('closeModalBtn');

    async function loadData() {
        // Carregar clientes
        const clientsSnap = await getDocs(collection(db, COLLECTIONS.CLIENTS));
        clients.clear();
        clientsSnap.forEach(doc => {
            clients.set(doc.id, { id: doc.id, ...doc.data() });
        });

        // Carregar pedidos
        const ordersSnap = await getDocs(query(collection(db, COLLECTIONS.ORDERS), orderBy('createdAt', 'desc')));
        orders = [];
        ordersSnap.forEach(doc => {
            orders.push({ id: doc.id, ...doc.data() });
        });

        renderClients();
    }

    function renderClients() {
        if (clients.size === 0) {
            clientsList.innerHTML = '<p class="text-center text-gray-500">Nenhum cliente cadastrado</p>';
            return;
        }

        clientsList.innerHTML = '';
        for (const [phone, client] of clients) {
            const clientOrders = orders.filter(o => o.customer?.phone?.replace(/\D/g, '') === phone);
            const div = document.createElement('div');
            div.className = 'bg-white p-6 rounded-xl shadow-md border cursor-pointer hover:bg-gray-50';
            div.dataset.phone = phone;
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <div>
                        <h4 class="text-xl font-bold">${client.name || 'Cliente'}</h4>
                        <p class="text-sm text-gray-600">${client.phone}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-bold text-green-600">${clientOrders.length}</p>
                        <p class="text-sm text-gray-500">pedidos</p>
                    </div>
                </div>
            `;
            clientsList.appendChild(div);
        }
    }

    function openClientModal(phone) {
        const client = clients.get(phone);
        if (!client) return;

        const clientOrders = orders.filter(o => o.customer?.phone?.replace(/\D/g, '') === phone);
        
        document.getElementById('clientName').textContent = client.name || 'Cliente';
        document.getElementById('clientPhone').textContent = client.phone;
        document.getElementById('clientAddress').textContent = client.address || 'Não informado';
        document.getElementById('clientEmail').textContent = client.email || 'Não informado';
        document.getElementById('clientOrderCount').textContent = clientOrders.length;

        const ordersContainer = document.getElementById('clientOrders');
        ordersContainer.innerHTML = '';

        if (clientOrders.length === 0) {
            ordersContainer.innerHTML = '<p class="text-gray-500">Nenhum pedido</p>';
        } else {
            clientOrders.forEach(order => {
                let itemsHtml = '';
                order.items?.forEach(item => {
                    itemsHtml += `<li class="text-sm">${item.quantity}x ${item.product.name} - R$ ${item.totalPrice.toFixed(2).replace('.', ',')}</li>`;
                });
                
                const div = document.createElement('div');
                div.className = 'bg-gray-50 p-4 rounded-lg border';
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold">#${order.id.slice(-6)}</span>
                        <span class="text-sm text-gray-500">${order.date}</span>
                    </div>
                    <ul class="mt-2 pl-4">${itemsHtml}</ul>
                    <div class="flex justify-between mt-2 pt-2 border-t">
                        <span>${order.paymentMethod}</span>
                        <span class="font-bold text-green-600">R$ ${order.total?.toFixed(2).replace('.', ',') || '0,00'}</span>
                    </div>
                    <span class="inline-block mt-2 px-2 py-1 rounded-full text-xs font-semibold bg-${order.status === 'Entregue' ? 'green' : 'yellow'}-100">
                        ${order.status}
                    </span>
                `;
                ordersContainer.appendChild(div);
            });
        }

        clientModal.classList.remove('hidden');
    }

    clientsList.addEventListener('click', (e) => {
        const div = e.target.closest('[data-phone]');
        if (div) openClientModal(div.dataset.phone);
    });

    closeModalBtn.addEventListener('click', () => clientModal.classList.add('hidden'));

    // Autenticação
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        await loadData();
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopFood - Acompanhar Pedido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; }
        .status-timeline { display: flex; justify-content: space-between; margin: 30px 0; position: relative; }
        .status-step { text-align: center; flex: 1; position: relative; z-index: 2; }
        .status-step .step-icon { width: 50px; height: 50px; background: #e5e7eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; transition: all 0.3s; }
        .status-step.completed .step-icon { background: #22c55e; color: white; }
        .status-step.active .step-icon { background: #f59e0b; color: white; animation: pulse 1.5s infinite; }
        .status-step .step-label { font-size: 12px; font-weight: 500; color: #6b7280; }
        .status-step.completed .step-label { color: #22c55e; font-weight: bold; }
        .status-step.active .step-label { color: #f59e0b; font-weight: bold; }
        .status-line { position: absolute; top: 25px; left: 0; right: 0; height: 3px; background: #e5e7eb; z-index: 1; }
        .status-line-fill { position: absolute; top: 0; left: 0; height: 100%; background: #22c55e; transition: width 0.5s; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-Pendente { background: #fef3c7; color: #d97706; }
        .status-Preparando { background: #dbeafe; color: #2563eb; }
        .status-Saiu-para-entrega { background: #dcfce7; color: #16a34a; }
        .status-Entregue { background: #e0e7ff; color: #4f46e5; }
        .status-Cancelado { background: #fee2e2; color: #dc2626; }
        .modal-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="p-4 bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-2xl mx-auto my-8">

    <!-- Cabeçalho -->
    <div class="flex items-center justify-between mb-6 pb-4 border-b">
        <div class="flex items-center gap-4">
            <a href="cliente.html" class="text-gray-500 hover:text-gray-800">
                <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <img id="restaurantLogo" src="#" alt="Logo" class="h-10 hidden">
            <h1 class="text-2xl font-bold text-gray-800">📦 Acompanhar Pedido</h1>
        </div>
        <a href="cliente.html" class="text-green-600 hover:text-green-700 text-sm font-semibold">+ Novo Pedido</a>
    </div>

    <!-- Tela de Login (se não estiver logado) -->
    <div id="loginSection" class="text-center py-8">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="h-10 w-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </div>
        <h2 class="text-xl font-bold mb-2">Acompanhe seu Pedido</h2>
        <p class="text-gray-500 text-sm mb-6">Digite seu número de WhatsApp para ver seu pedido atual</p>
        <input type="tel" id="phoneInput" placeholder="(99) 99999-9999" class="w-full max-w-sm mx-auto p-3 border rounded-lg mb-3 text-center">
        <button id="loginBtn" class="bg-green-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-green-700">
            Ver Meu Pedido
        </button>
    </div>

    <!-- Área do Pedido Atual -->
    <div id="orderArea" class="hidden">
        <!-- Info do Cliente -->
        <div class="bg-gradient-to-r from-green-500 to-green-600 rounded-xl p-4 mb-6 text-white">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-sm opacity-90">Olá,</p>
                    <p id="customerName" class="text-xl font-bold"></p>
                    <p id="customerPhone" class="text-sm opacity-90"></p>
                </div>
                <div class="text-right">
                    <p class="text-xs opacity-90">Status do pedido</p>
                    <p id="orderStatusBadge" class="text-lg font-bold"></p>
                </div>
            </div>
        </div>

        <!-- Card do Pedido -->
        <div id="orderCard" class="border rounded-xl overflow-hidden shadow-md">
            <div id="orderContent">
                <div class="text-center text-gray-500 py-8">Carregando pedido...</div>
            </div>
        </div>

        <!-- Botão Sair -->
        <div class="mt-6 text-center">
            <button id="logoutBtn" class="text-red-500 hover:text-red-700 text-sm">Sair da conta</button>
        </div>
    </div>

    <!-- Mensagem de Nenhum Pedido -->
    <div id="noOrderSection" class="hidden text-center py-8">
        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="h-10 w-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-700 mb-2">Nenhum pedido ativo</h3>
        <p class="text-gray-500 mb-4">Você não tem nenhum pedido em andamento no momento.</p>
        <a href="cliente.html" class="inline-block bg-green-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-green-700">
            Fazer um pedido
        </a>
    </div>
</div>

<div id="messageBox" class="fixed bottom-4 right-4 p-4 text-white rounded-lg shadow-lg z-50 hidden"></div>

<script type="module">
    import { 
        db, collection, query, where, getDocs, onSnapshot, doc, updateDoc, Timestamp, COLLECTIONS 
    } from './firebase-config.js';

    let currentPhone = null;
    let currentOrder = null;
    let unsubscribeOrder = null;

    // DOM Elements
    const loginSection = document.getElementById('loginSection');
    const orderArea = document.getElementById('orderArea');
    const noOrderSection = document.getElementById('noOrderSection');
    const phoneInput = document.getElementById('phoneInput');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const orderContent = document.getElementById('orderContent');
    const customerNameSpan = document.getElementById('customerName');
    const customerPhoneSpan = document.getElementById('customerPhone');
    const orderStatusBadge = document.getElementById('orderStatusBadge');
    const restaurantLogo = document.getElementById('restaurantLogo');
    const messageBox = document.getElementById('messageBox');

    function showMessage(msg, type = 'success') {
        messageBox.textContent = msg;
        messageBox.classList.remove('hidden', 'bg-green-500', 'bg-red-500', 'bg-yellow-500');
        if (type === 'success') messageBox.classList.add('bg-green-500');
        else if (type === 'error') messageBox.classList.add('bg-red-500');
        else messageBox.classList.add('bg-yellow-500');
        setTimeout(() => messageBox.classList.add('hidden'), 3000);
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'Data não disponível';
        if (dateValue && typeof dateValue.toDate === 'function') {
            return dateValue.toDate().toLocaleString('pt-BR');
        }
        if (dateValue && dateValue.seconds) {
            return new Date(dateValue.seconds * 1000).toLocaleString('pt-BR');
        }
        return new Date(dateValue).toLocaleString('pt-BR');
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function loadRestaurantLogo() {
        try {
            const { getDoc, doc } = await import('./firebase-config.js');
            const docRef = doc(db, COLLECTIONS.RESTAURANT_PROFILE, 'main');
            const docSnap = await getDoc(docRef);
            if (docSnap.exists() && docSnap.data().logo) {
                restaurantLogo.src = docSnap.data().logo;
                restaurantLogo.classList.remove('hidden');
            }
        } catch (error) {
            console.error("Erro ao carregar logo:", error);
        }
    }

    async function buscarNomeCliente(phone) {
        try {
            const { getDoc, doc } = await import('./firebase-config.js');
            const clientRef = doc(db, COLLECTIONS.CLIENTS, phone.replace(/\D/g, ''));
            const clientSnap = await getDoc(clientRef);
            if (clientSnap.exists()) {
                return clientSnap.data().name || 'Cliente';
            }
        } catch (error) {}
        return 'Cliente';
    }

    function getStatusIcon(status) {
        const icons = {
            'Pendente': '⏳',
            'Preparando': '👨‍🍳',
            'Saiu para entrega': '🛵',
            'Entregue': '✅',
            'Cancelado': '❌'
        };
        return icons[status] || '📋';
    }

    function getStatusClass(orderStatus, stepStatus) {
        const steps = ['Pendente', 'Preparando', 'Saiu para entrega', 'Entregue'];
        const orderIndex = steps.indexOf(orderStatus);
        const stepIndex = steps.indexOf(stepStatus);
        
        if (orderStatus === 'Cancelado') return '';
        if (orderIndex >= stepIndex) return 'completed';
        if (orderIndex === stepIndex - 1) return 'active';
        return '';
    }

    function getStatusWidth(status) {
        if (status === 'Cancelado') return 0;
        const widths = {
            'Pendente': 0,
            'Preparando': 33,
            'Saiu para entrega': 66,
            'Entregue': 100
        };
        return widths[status] || 0;
    }

    function renderOrder(order) {
        const total = order.total || (order.subtotal + (order.deliveryFee || 5.00));
        const statusClass = `status-${order.status?.replace(/ /g, '-') || 'Pendente'}`;
        
        // Atualizar badge de status
        orderStatusBadge.innerHTML = `${getStatusIcon(order.status)} ${order.status || 'Pendente'}`;
        orderStatusBadge.className = `text-lg font-bold ${statusClass}`;
        
        let itemsHtml = '';
        order.items?.forEach(item => {
            let complementsHtml = '';
            if (item.complements) {
                for (const group in item.complements) {
                    if (item.complements[group] && item.complements[group].length) {
                        complementsHtml += `<div class="mt-2 pl-3 border-l-2 border-orange-200">`;
                        complementsHtml += `<p class="text-xs font-bold text-gray-600">${escapeHtml(group)}:</p>`;
                        complementsHtml += `<ul class="text-xs text-gray-500">`;
                        item.complements[group].forEach(opt => {
                            complementsHtml += `<li>• ${escapeHtml(opt.name)} ${opt.price > 0 ? `(+R$ ${opt.price.toFixed(2).replace('.', ',')})` : ''}</li>`;
                        });
                        complementsHtml += `</ul></div>`;
                    }
                }
            }
            itemsHtml += `
                <div class="flex justify-between py-2 border-b text-sm">
                    <div>
                        <span class="font-bold">${item.quantity}x</span> ${escapeHtml(item.product?.name)}
                        ${complementsHtml}
                    </div>
                    <span class="font-bold text-green-600">R$ ${(item.totalPrice || 0).toFixed(2).replace('.', ',')}</span>
                </div>
            `;
        });
        
        orderContent.innerHTML = `
            <div class="p-5">
                <!-- Timeline de Status -->
                <div class="status-timeline">
                    <div class="status-line"></div>
                    <div class="status-line-fill" style="width: ${getStatusWidth(order.status)}%"></div>
                    
                    <div class="status-step ${getStatusClass(order.status, 'Pendente')}">
                        <div class="step-icon">📝</div>
                        <div class="step-label">Pedido<br>Recebido</div>
                    </div>
                    <div class="status-step ${getStatusClass(order.status, 'Preparando')}">
                        <div class="step-icon">👨‍🍳</div>
                        <div class="step-label">Preparando</div>
                    </div>
                    <div class="status-step ${getStatusClass(order.status, 'Saiu para entrega')}">
                        <div class="step-icon">🛵</div>
                        <div class="step-label">Saiu para<br>Entrega</div>
                    </div>
                    <div class="status-step ${getStatusClass(order.status, 'Entregue')}">
                        <div class="step-icon">✅</div>
                        <div class="step-label">Entregue</div>
                    </div>
                </div>
                
                <div class="bg-gray-50 p-4 rounded-lg mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <p class="font-bold">Pedido #${(order.id || '').slice(-6)}</p>
                        <p class="text-xs text-gray-500">${formatDate(order.createdAt || order.date)}</p>
                    </div>
                    <div class="border-t pt-2">
                        ${itemsHtml || '<p class="text-gray-500">Nenhum item</p>'}
                    </div>
                </div>
                
                <div class="bg-gray-50 p-4 rounded-lg mb-4">
                    <p class="font-bold text-sm mb-2">📍 Endereço de entrega</p>
                    <p class="text-sm">${escapeHtml(order.customer?.address || 'Não informado')}</p>
                    ${order.customer?.complement ? `<p class="text-xs text-gray-500 mt-1">Complemento: ${escapeHtml(order.customer.complement)}</p>` : ''}
                    ${order.customer?.reference ? `<p class="text-xs text-gray-500">Referência: ${escapeHtml(order.customer.reference)}</p>` : ''}
                </div>
                
                <div class="space-y-2">
                    <div class="flex justify-between text-sm">
                        <span>Subtotal:</span>
                        <span>R$ ${(order.subtotal || 0).toFixed(2).replace('.', ',')}</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span>Taxa de entrega:</span>
                        <span>R$ ${(order.deliveryFee || 5.00).toFixed(2).replace('.', ',')}</span>
                    </div>
                    <div class="flex justify-between text-lg font-bold text-green-600 pt-2 border-t">
                        <span>TOTAL:</span>
                        <span>R$ ${total.toFixed(2).replace('.', ',')}</span>
                    </div>
                </div>
                
                <div class="mt-4 pt-3 border-t">
                    <p class="text-sm"><strong>💳 Pagamento:</strong> ${order.paymentMethod || 'Não informado'}</p>
                </div>
                
                ${order.status !== 'Entregue' && order.status !== 'Cancelado' ? `
                    <div class="mt-4 p-3 bg-yellow-50 rounded-lg text-center">
                        <p class="text-sm text-yellow-700">
                            ⏱️ Seu pedido está sendo preparado! Em breve sairá para entrega.
                        </p>
                    </div>
                ` : ''}
                
                ${order.status === 'Saiu para entrega' ? `
                    <div class="mt-4 p-3 bg-green-50 rounded-lg text-center">
                        <p class="text-sm text-green-700">
                            🛵 Seu pedido saiu para entrega! Fique atento ao entregador.
                        </p>
                    </div>
                ` : ''}
                
                ${order.status === 'Entregue' ? `
                    <div class="mt-4 p-3 bg-blue-50 rounded-lg text-center">
                        <p class="text-sm text-blue-700">
                            ✅ Pedido entregue! Obrigado por escolher nosso delivery!
                        </p>
                    </div>
                ` : ''}
                
                ${order.status === 'Cancelado' ? `
                    <div class="mt-4 p-3 bg-red-50 rounded-lg text-center">
                        <p class="text-sm text-red-700">
                            ❌ Este pedido foi cancelado.
                        </p>
                    </div>
                ` : ''}
            </div>
        `;
    }

    // Buscar APENAS o pedido mais recente - SEM ORDERBY (funciona sem índice!)
    function startOrderListener(phone) {
        if (unsubscribeOrder) unsubscribeOrder();
        
        const originalPhone = phone;
        
        console.log("Buscando pedido atual para:", originalPhone);
        
        // SEM orderBy - não precisa de índice composto!
        const q = query(
            collection(db, COLLECTIONS.ORDERS),
            where('customer.phone', '==', originalPhone),
            where('status', 'in', ['Pendente', 'Preparando', 'Saiu para entrega'])
        );
        
        unsubscribeOrder = onSnapshot(q, 
            (snapshot) => {
                const orders = [];
                snapshot.forEach(doc => {
                    orders.push({ id: doc.id, ...doc.data() });
                });
                
                if (orders.length > 0) {
                    // Ordenar manualmente por createdAt (mais recente primeiro)
                    orders.sort((a, b) => {
                        const dateA = a.createdAt?.seconds || 0;
                        const dateB = b.createdAt?.seconds || 0;
                        return dateB - dateA;
                    });
                    
                    currentOrder = orders[0];
                    console.log("Pedido encontrado:", currentOrder.id, currentOrder.status);
                    
                    loginSection.classList.add('hidden');
                    noOrderSection.classList.add('hidden');
                    orderArea.classList.remove('hidden');
                    
                    renderOrder(currentOrder);
                } else {
                    // Nenhum pedido ativo
                    loginSection.classList.add('hidden');
                    orderArea.classList.add('hidden');
                    noOrderSection.classList.remove('hidden');
                }
            },
            (error) => {
                console.error("Erro no listener:", error);
                showMessage('Erro ao carregar pedido: ' + error.message, 'error');
            }
        );
    }

    // Login
    async function doLogin() {
        const phone = phoneInput.value.trim();
        if (!phone) {
            showMessage('Digite seu número de WhatsApp', 'error');
            return;
        }
        
        currentPhone = phone;
        sessionStorage.setItem('customerPhone', phone);
        
        const nome = await buscarNomeCliente(phone);
        customerNameSpan.textContent = nome;
        customerPhoneSpan.textContent = phone;
        
        startOrderListener(phone);
        showMessage('✅ Conectado! Buscando seu pedido...', 'success');
    }

    function doLogout() {
        if (unsubscribeOrder) unsubscribeOrder();
        sessionStorage.removeItem('customerPhone');
        currentPhone = null;
        currentOrder = null;
        
        loginSection.classList.remove('hidden');
        orderArea.classList.add('hidden');
        noOrderSection.classList.add('hidden');
        phoneInput.value = '';
        showMessage('Você saiu da sua conta', 'yellow');
    }

    // Event Listeners
    loginBtn.addEventListener('click', doLogin);
    phoneInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') doLogin();
    });
    
    logoutBtn.addEventListener('click', doLogout);
    
    // Verificar se já tem sessão ativa
    const savedPhone = sessionStorage.getItem('customerPhone');
    if (savedPhone) {
        currentPhone = savedPhone;
        phoneInput.value = savedPhone;
        buscarNomeCliente(savedPhone).then(nome => {
            customerNameSpan.textContent = nome;
            customerPhoneSpan.textContent = savedPhone;
        });
        startOrderListener(savedPhone);
    }
    
    // Carregar logo
    loadRestaurantLogo();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopFood - Meus Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; }
        .notification-box { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: #ef4444; color: white; padding: 1rem 2rem; border-radius: 9999px; z-index: 1000; opacity: 0; transition: opacity 0.5s; }
        .notification-box.show { opacity: 1; }
        .new-order { background-color: #fff3e0 !important; border-left: 4px solid #ef4444 !important; }
        .dispatched-order { background-color: #e0f2fe !important; border-left: 4px solid #3b82f6 !important; }
        @media print { body * { visibility: hidden; } .print-area, .print-area * { visibility: visible; } .print-area { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body class="p-4 bg-gray-100 min-h-screen">

<div id="app-container" class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-5xl mx-auto my-8">
    <div class="flex items-center justify-between mb-6 border-b pb-4">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-gray-500 hover:text-gray-800">
                <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12" /></svg>
            </a>
            <h1 class="text-3xl font-bold">📋 Pedidos</h1>
        </div>
        <span class="bg-orange-100 text-orange-800 px-4 py-1 rounded-full text-sm">Tempo Real 🔴</span>
    </div>

    <!-- Filtros -->
    <div class="flex gap-2 mb-6 flex-wrap">
        <button class="filter-btn bg-orange-500 text-white px-4 py-2 rounded-full text-sm" data-filter="todos">📋 Todos</button>
        <button class="filter-btn bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm" data-filter="Pendente">⏳ Pendente</button>
        <button class="filter-btn bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm" data-filter="Preparando">👨‍🍳 Preparando</button>
        <button class="filter-btn bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm" data-filter="Saiu para entrega">🛵 Saiu para entrega</button>
        <button class="filter-btn bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm" data-filter="Entregue">✅ Entregue</button>
        <button class="filter-btn bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm" data-filter="Cancelado">❌ Cancelado</button>
    </div>

    <div class="mb-4 flex justify-between items-center">
        <h2 class="text-xl font-bold">📌 Em Andamento</h2>
        <button id="refreshBtn" class="bg-blue-500 text-white px-3 py-1 rounded-full text-sm hover:bg-blue-600">🔄 Atualizar</button>
    </div>
    <div id="active-orders-list" class="space-y-4 mb-10">
        <div class="text-center text-gray-500 py-8">Carregando pedidos...</div>
    </div>

    <div class="border-t pt-6">
        <h2 class="text-xl font-bold mb-4">✅ Finalizados</h2>
        <div id="completed-orders-list" class="space-y-3">
            <div class="text-center text-gray-400 italic py-4">Carregando...</div>
        </div>
    </div>
</div>

<div id="messageBox" class="fixed bottom-4 right-4 p-4 text-white rounded-lg shadow-lg z-50 hidden"></div>
<div id="newOrderNotification" class="notification-box hidden">🔔 NOVO PEDIDO! Verifique a lista</div>

<script type="module">
    import { db, auth, collection, doc, getDocs, updateDoc, query, orderBy, onSnapshot, Timestamp, COLLECTIONS } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // ==================== ESTADO GLOBAL ====================
    let allOrders = [];
    let currentFilter = 'todos';
    let unsubscribeOrders = null;
    let restaurantProfile = {};
    let ultimoPedidoId = null;      // Para evitar som duplicado
    let notificacaoAudio = null;    // Para o áudio personalizado

    // DOM Elements
    const activeList = document.getElementById('active-orders-list');
    const completedList = document.getElementById('completed-orders-list');
    const messageBox = document.getElementById('messageBox');
    const notification = document.getElementById('newOrderNotification');
    const refreshBtn = document.getElementById('refreshBtn');

    function showMessage(msg, type = 'success') {
        messageBox.textContent = msg;
        messageBox.classList.remove('hidden', 'bg-green-500', 'bg-red-500', 'bg-yellow-500');
        if (type === 'success') messageBox.classList.add('bg-green-500');
        else if (type === 'error') messageBox.classList.add('bg-red-500');
        else messageBox.classList.add('bg-yellow-500');
        setTimeout(() => messageBox.classList.add('hidden'), 3000);
    }

    // ==================== FUNÇÕES DE NOTIFICAÇÃO SONORA ====================
    function preloadAudio() {
        notificacaoAudio = new Audio('som.mp3');
        notificacaoAudio.load();
        console.log("🔊 Áudio de notificação pré-carregado");
    }

    function playNotificationSound() {
        if (notificacaoAudio) {
            notificacaoAudio.currentTime = 0; // Reinicia o som
            notificacaoAudio.play().catch(e => {
                console.log('Áudio bloqueado pelo navegador:', e);
                // Tentativa alternativa
                const fallbackAudio = new Audio('som.mp3');
                fallbackAudio.play().catch(e2 => console.log('Falha no áudio fallback'));
            });
        } else {
            const audio = new Audio('som.mp3');
            audio.play().catch(e => console.log('Erro ao tocar som:', e));
        }
    }

    function showNewOrderNotification() {
        // Notificação visual
        notification.classList.remove('hidden');
        setTimeout(() => notification.classList.add('show'), 10);
        
        // Tocar o som personalizado
        playNotificationSound();
        
        setTimeout(() => {
            notification.classList.remove('show');
            setTimeout(() => notification.classList.add('hidden'), 500);
        }, 5000);
    }

    async function loadRestaurantProfile() {
        try {
            const docRef = doc(db, COLLECTIONS.RESTAURANT_PROFILE, 'main');
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) restaurantProfile = docSnap.data();
        } catch (error) {
            console.error("Erro ao carregar perfil:", error);
        }
    }

    function formatDate(dateValue) {
        if (!dateValue) return 'Data não disponível';
        if (dateValue && typeof dateValue.toDate === 'function') {
            return dateValue.toDate().toLocaleString('pt-BR');
        }
        if (typeof dateValue === 'string') return dateValue;
        if (dateValue && dateValue.seconds) {
            return new Date(dateValue.seconds * 1000).toLocaleString('pt-BR');
        }
        return new Date(dateValue).toLocaleString('pt-BR');
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderOrders() {
        // Separar pedidos ativos e finalizados
        const activeOrders = allOrders.filter(order => 
            order.status !== 'Entregue' && 
            order.status !== 'Cancelado' && 
            order.status !== 'Finalizado'
        );
        
        const completedOrders = allOrders.filter(order => 
            order.status === 'Entregue' || 
            order.status === 'Cancelado' || 
            order.status === 'Finalizado'
        );
        
        // Aplicar filtro nos ativos
        let filteredActive = activeOrders;
        if (currentFilter !== 'todos') {
            filteredActive = activeOrders.filter(order => order.status === currentFilter);
        }
        
        renderActiveOrders(filteredActive);
        renderCompletedOrders(completedOrders);
    }

    function renderActiveOrders(orders) {
        if (orders.length === 0) {
            activeList.innerHTML = '<div class="text-center text-gray-500 py-8">📭 Nenhum pedido ativo no momento</div>';
            return;
        }

        activeList.innerHTML = '';
        orders.forEach(order => {
            const card = createOrderCard(order, true);
            activeList.appendChild(card);
        });
    }

    function renderCompletedOrders(orders) {
        if (orders.length === 0) {
            completedList.innerHTML = '<div class="text-center text-gray-400 italic py-4">Nenhum pedido finalizado</div>';
            return;
        }

        completedList.innerHTML = '';
        orders.forEach(order => {
            const card = createOrderCard(order, false);
            completedList.appendChild(card);
        });
    }

    function createOrderCard(order, isActive) {
        const div = document.createElement('div');
        
        let highlightClass = '';
        if (isActive) {
            if (order.status === 'Pendente') highlightClass = 'new-order';
            if (order.status === 'Saiu para entrega') highlightClass = 'dispatched-order';
        }
        
        const orderId = order.id;
        
        div.className = `bg-white p-5 rounded-xl shadow-sm border cursor-pointer hover:shadow-md transition-all ${highlightClass}`;
        div.setAttribute('data-order-id', orderId);
        
        let itemsHtml = '';
        const items = order.items || [];
        
        items.forEach(item => {
            let complementsHtml = '';
            const complements = item.complements || {};
            
            for (const group in complements) {
                const groupOptions = complements[group] || [];
                if (groupOptions.length > 0) {
                    complementsHtml += `<p class="text-xs font-bold mt-1 text-gray-600">${escapeHtml(group)}:</p>`;
                    complementsHtml += `<ul class="text-xs text-gray-500 pl-4">`;
                    groupOptions.forEach(opt => {
                        complementsHtml += `<li>${escapeHtml(opt.name)} (+R$ ${(opt.price || 0).toFixed(2).replace('.', ',')})</li>`;
                    });
                    complementsHtml += `</ul>`;
                }
            }
            
            itemsHtml += `
                <li class="text-sm border-b py-2 last:border-0">
                    <div class="flex justify-between">
                        <span><span class="font-bold">${item.quantity || 1}x</span> ${escapeHtml(item.product?.name || 'Produto')}</span>
                        <span class="font-bold text-green-600">R$ ${(item.totalPrice || 0).toFixed(2).replace('.', ',')}</span>
                    </div>
                    ${complementsHtml}
                </li>
            `;
        });

        const deliveryFee = order.deliveryFee || 5.00;
        const subtotal = order.subtotal || (order.total - deliveryFee);
        const total = order.total || (subtotal + deliveryFee);
        
        const statusColors = {
            'Pendente': 'bg-yellow-100 text-yellow-800',
            'Preparando': 'bg-blue-100 text-blue-800',
            'Saiu para entrega': 'bg-green-100 text-green-800',
            'Entregue': 'bg-gray-100 text-gray-600',
            'Cancelado': 'bg-red-100 text-red-800',
            'Finalizado': 'bg-gray-100 text-gray-500'
        };
        
        const statusText = {
            'Pendente': '⏳ Pendente',
            'Preparando': '👨‍🍳 Preparando',
            'Saiu para entrega': '🛵 Saiu para entrega',
            'Entregue': '✅ Entregue',
            'Cancelado': '❌ Cancelado',
            'Finalizado': '📦 Finalizado'
        };
        
        let actionButtons = '';
        if (isActive && order.status !== 'Cancelado' && order.status !== 'Entregue') {
            actionButtons = `
                <div class="flex gap-2 mt-4 pt-2 border-t">
                    <button class="update-status-btn bg-blue-500 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-blue-600 transition-colors" data-status="Preparando" data-order-id="${orderId}">
                        👨‍🍳 Preparar
                    </button>
                    <button class="update-status-btn bg-green-500 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-green-600 transition-colors" data-status="Saiu para entrega" data-order-id="${orderId}">
                        🛵 Despachar
                    </button>
                    <button class="print-order-btn bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-sm hover:bg-gray-300 transition-colors" data-order-id="${orderId}">
                        🖨️ Imprimir
                    </button>
                    <button class="cancel-order-btn bg-red-500 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-red-600 transition-colors" data-order-id="${orderId}">
                        ❌ Cancelar
                    </button>
                </div>
            `;
        } else if (!isActive && order.status !== 'Cancelado') {
            actionButtons = `
                <div class="flex gap-2 mt-3">
                    <button class="print-order-btn bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-sm hover:bg-gray-300 transition-colors" data-order-id="${orderId}">
                        🖨️ Imprimir
                    </button>
                </div>
            `;
        }
        
        const customer = order.customer || {};
        
        div.innerHTML = `
            <div class="flex justify-between items-start flex-wrap gap-2">
                <div>
                    <h4 class="text-xl font-bold">Pedido #${(orderId || '').slice(-6)}</h4>
                    <p class="text-sm text-gray-500">📅 ${formatDate(order.createdAt || order.date)}</p>
                    <p class="text-sm text-gray-500 mt-1">👤 ${escapeHtml(customer.name || 'Cliente')} | 📞 ${escapeHtml(customer.phone || '-')}</p>
                </div>
                <div class="text-right">
                    <span class="inline-block px-3 py-1 rounded-full text-sm font-semibold ${statusColors[order.status] || 'bg-gray-100'}">
                        ${statusText[order.status] || order.status}
                    </span>
                    <p class="text-xl font-bold text-green-600 mt-1">R$ ${total.toFixed(2).replace('.', ',')}</p>
                </div>
            </div>
            <div class="order-details hidden mt-4 pt-4 border-t">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="bg-gray-50 p-3 rounded-lg">
                        <p class="font-bold text-gray-700 mb-2">📍 Dados do Cliente:</p>
                        <p class="text-sm">🏠 ${escapeHtml(customer.address || 'Não informado')}</p>
                        ${customer.complement ? `<p class="text-sm">📌 Complemento: ${escapeHtml(customer.complement)}</p>` : ''}
                        ${customer.reference ? `<p class="text-sm">📍 Referência: ${escapeHtml(customer.reference)}</p>` : ''}
                        ${customer.cep ? `<p class="text-sm">📮 CEP: ${escapeHtml(customer.cep)}</p>` : ''}
                    </div>
                    <div class="bg-gray-50 p-3 rounded-lg">
                        <p class="font-bold text-gray-700 mb-2">💳 Pagamento:</p>
                        <p class="text-sm">${order.paymentMethod || 'Não informado'}</p>
                    </div>
                </div>
                <div class="mb-4">
                    <p class="font-bold text-gray-700 mb-2">🍔 Itens do Pedido:</p>
                    <ul class="space-y-2 bg-gray-50 p-3 rounded-lg">
                        ${itemsHtml || '<li class="text-gray-500">Nenhum item</li>'}
                    </ul>
                </div>
                <div class="border-t pt-3 flex justify-between text-sm">
                    <span>Subtotal: R$ ${(subtotal || 0).toFixed(2).replace('.', ',')}</span>
                    <span>Taxa entrega: R$ ${deliveryFee.toFixed(2).replace('.', ',')}</span>
                </div>
                ${actionButtons}
            </div>
        `;
        
        return div;
    }

    async function updateOrderStatus(orderId, newStatus) {
        try {
            if (!orderId) {
                throw new Error("ID do pedido não informado");
            }
            
            console.log("Atualizando pedido:", orderId, "para status:", newStatus);
            
            const orderRef = doc(db, COLLECTIONS.ORDERS, orderId);
            await updateDoc(orderRef, { 
                status: newStatus,
                updatedAt: Timestamp.now()
            });
            
            showMessage(`✅ Status atualizado para "${newStatus}"`, 'success');
        } catch (error) {
            console.error("Erro ao atualizar status:", error);
            showMessage('Erro ao atualizar status: ' + error.message, 'error');
        }
    }

    async function cancelOrder(orderId) {
        try {
            if (!orderId) {
                throw new Error("ID do pedido não informado");
            }
            
            const orderRef = doc(db, COLLECTIONS.ORDERS, orderId);
            await updateDoc(orderRef, { 
                status: 'Cancelado',
                updatedAt: Timestamp.now()
            });
            showMessage('❌ Pedido cancelado!', 'yellow');
        } catch (error) {
            console.error("Erro ao cancelar pedido:", error);
            showMessage('Erro ao cancelar pedido: ' + error.message, 'error');
        }
    }

    function printOrder(order) {
        const deliveryFee = order.deliveryFee || 5.00;
        const subtotal = order.subtotal || (order.total - deliveryFee);
        const total = order.total || (subtotal + deliveryFee);
        const customer = order.customer || {};
        const orderId = order.id || '';
        
        let itemsHtml = '';
        const items = order.items || [];
        
        items.forEach(item => {
            let complementsHtml = '';
            const complements = item.complements || {};
            
            for (const group in complements) {
                const groupOptions = complements[group] || [];
                if (groupOptions.length > 0) {
                    complementsHtml += `<div style="font-weight:bold; font-size:11px; margin-top:5px;">${group}:</div>`;
                    complementsHtml += `<ul style="padding-left:15px; margin:2px 0;">`;
                    groupOptions.forEach(opt => {
                        complementsHtml += `<li style="font-size:10px;">- ${opt.name} (+R$ ${(opt.price || 0).toFixed(2).replace('.', ',')})</li>`;
                    });
                    complementsHtml += `</ul>`;
                }
            }
            
            itemsHtml += `
                <div style="border-bottom:1px solid #eee; padding:8px 0;">
                    <div style="display:flex; justify-content:space-between;">
                        <span><strong>${item.quantity || 1}x</strong> ${item.product?.name || 'Produto'}</span>
                        <span>R$ ${(item.totalPrice || 0).toFixed(2).replace('.', ',')}</span>
                    </div>
                    ${complementsHtml}
                </div>
            `;
        });

        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>Pedido #${(orderId || '').slice(-6)}</title>
                <style>
                    body { font-family: Arial, sans-serif; padding: 20px; max-width: 350px; margin: 0 auto; line-height: 1.4; }
                    @media print { @page { margin: 5mm; } body { margin: 0; } }
                    .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
                    .total { font-size: 18px; font-weight: bold; text-align: right; border-top: 2px solid #333; padding-top: 10px; margin-top: 10px; }
                    .info { margin: 10px 0; padding: 8px; background: #f5f5f5; border-radius: 8px; }
                </style>
            </head>
            <body>
                <div class="header">
                    ${restaurantProfile.logo ? `<img src="${restaurantProfile.logo}" style="max-height: 50px; margin: 0 auto;">` : ''}
                    <h2>${restaurantProfile.name || 'Delivery'}</h2>
                    <p>${restaurantProfile.phone || ''}</p>
                </div>
                
                <h3 style="text-align:center;">Pedido #${(orderId || '').slice(-6)}</h3>
                <p style="text-align:center; font-size:12px;">${formatDate(order.createdAt || order.date)}</p>
                
                <div class="info">
                    <p><strong>Cliente:</strong> ${customer.name || '-'}</p>
                    <p><strong>Telefone:</strong> ${customer.phone || '-'}</p>
                    <p><strong>Endereço:</strong> ${customer.address || '-'} ${customer.number ? ', ' + customer.number : ''}</p>
                    ${customer.complement ? `<p><strong>Complemento:</strong> ${customer.complement}</p>` : ''}
                </div>
                
                <h4>Itens:</h4>
                ${itemsHtml}
                
                <div style="margin-top: 15px;">
                    <div style="display:flex; justify-content:space-between;">
                        <span>Subtotal:</span>
                        <span>R$ ${(subtotal || 0).toFixed(2).replace('.', ',')}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between;">
                        <span>Taxa entrega:</span>
                        <span>R$ ${deliveryFee.toFixed(2).replace('.', ',')}</span>
                    </div>
                </div>
                
                <div class="total">
                    <div style="display:flex; justify-content:space-between;">
                        <span>TOTAL:</span>
                        <span>R$ ${total.toFixed(2).replace('.', ',')}</span>
                    </div>
                </div>
                
                <p style="margin-top:15px;"><strong>Pagamento:</strong> ${order.paymentMethod || '-'}</p>
                <p style="text-align:center; font-size:10px; margin-top:20px; color:#999;">Impresso em: ${new Date().toLocaleString()}</p>
            </body>
            </html>
        `);
        printWindow.document.close();
        printWindow.focus();
        setTimeout(() => printWindow.print(), 500);
    }

    // ==================== LISTENER EM TEMPO REAL COM SOM ====================
    function startOrdersListener() {
        if (unsubscribeOrders) unsubscribeOrders();
        
        const q = query(collection(db, COLLECTIONS.ORDERS), orderBy('createdAt', 'desc'));
        
        unsubscribeOrders = onSnapshot(q, 
            (snapshot) => {
                const previousCount = allOrders.length;
                const novosPedidosIds = [];
                
                // Identificar novos pedidos adicionados
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        novosPedidosIds.push(change.doc.id);
                    }
                });
                
                allOrders = [];
                snapshot.forEach(doc => {
                    const order = { id: doc.id, ...doc.data() };
                    allOrders.push(order);
                });
                
                renderOrders();
                
                // Verificar se tem novo pedido
                if (novosPedidosIds.length > 0 && allOrders.length > previousCount) {
                    // Tocar o SOM personalizado
                    showNewOrderNotification();
                    
                    const novoPedido = allOrders.find(o => o.id === novosPedidosIds[0]);
                    if (novoPedido) {
                        showMessage(`🔔 NOVO PEDIDO! ID: #${novoPedido.id.slice(-6)}`, 'yellow');
                        
                        // Rolar a página para o topo
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }
            },
            (error) => {
                console.error("Erro no listener de pedidos:", error);
                activeList.innerHTML = `<div class="text-center text-red-500 py-8">⚠️ Erro ao carregar pedidos: ${error.message}</div>`;
            }
        );
    }

    // ==================== EVENT LISTENERS ====================
    document.addEventListener('click', async (e) => {
        // Botão de atualizar status
        const statusBtn = e.target.closest('.update-status-btn');
        if (statusBtn) {
            e.stopPropagation();
            const orderId = statusBtn.getAttribute('data-order-id');
            const newStatus = statusBtn.getAttribute('data-status');
            
            if (!orderId) {
                showMessage('Erro: ID do pedido não encontrado', 'error');
                return;
            }
            
            if (confirm(`Alterar status do pedido #${orderId.slice(-6)} para "${newStatus}"?`)) {
                await updateOrderStatus(orderId, newStatus);
            }
            return;
        }
        
        // Botão de cancelar
        const cancelBtn = e.target.closest('.cancel-order-btn');
        if (cancelBtn) {
            e.stopPropagation();
            const orderId = cancelBtn.getAttribute('data-order-id');
            if (confirm(`❌ Tem certeza que deseja cancelar o pedido #${orderId?.slice(-6)}?`)) {
                await cancelOrder(orderId);
            }
            return;
        }
        
        // Botão de imprimir
        const printBtn = e.target.closest('.print-order-btn');
        if (printBtn) {
            e.stopPropagation();
            const orderId = printBtn.getAttribute('data-order-id');
            const order = allOrders.find(o => o.id === orderId);
            if (order) {
                printOrder(order);
            } else {
                showMessage('Pedido não encontrado para impressão', 'error');
            }
            return;
        }
        
        // Abrir/fechar detalhes
        const orderDiv = e.target.closest('[data-order-id]');
        if (orderDiv && !e.target.closest('button')) {
            const details = orderDiv.querySelector('.order-details');
            if (details) {
                details.classList.toggle('hidden');
            }
        }
    });

    // Filtros
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-orange-500', 'text-white');
                b.classList.add('bg-gray-200', 'text-gray-700');
            });
            btn.classList.remove('bg-gray-200', 'text-gray-700');
            btn.classList.add('bg-orange-500', 'text-white');
            
            currentFilter = btn.dataset.filter;
            renderOrders();
        });
    });

    // Botão de refresh manual
    if (refreshBtn) {
        refreshBtn.addEventListener('click', () => {
            showMessage('🔄 Atualizando pedidos...', 'yellow');
            startOrdersListener();
        });
    }

    // ==================== INICIALIZAÇÃO ====================
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        await loadRestaurantProfile();
        
        // Pré-carregar o áudio antes de iniciar o listener
        preloadAudio();
        
        startOrdersListener();
        showMessage('👋 Bem-vindo! Monitorando pedidos em tempo real', 'success');
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopFood - Meus Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; }
        .notification-box { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: #ef4444; color: white; padding: 1rem 2rem; border-radius: 9999px; z-index: 1000; opacity: 0; transition: opacity 0.5s; }
        .notification-box.show { opacity: 1; }
        .new-order { background-color: #fff3e0 !important; }
        @media print { body * { visibility: hidden; } .print-area, .print-area * { visibility: visible; } .print-area { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body class="p-4 bg-gray-100 min-h-screen">

<div id="app-container" class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-5xl mx-auto my-8">
    <div class="flex items-center justify-between mb-6 border-b pb-4">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-gray-500 hover:text-gray-800">
                <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12" /></svg>
            </a>
            <h1 class="text-3xl font-bold">Pedidos</h1>
        </div>
        <span class="bg-orange-100 text-orange-800 px-4 py-1 rounded-full text-sm">Ativo</span>
    </div>

    <h2 class="text-xl font-bold mb-4">📋 Em Andamento</h2>
    <div id="active-orders-list" class="space-y-4 mb-10"></div>

    <div class="border-t pt-6">
        <h2 class="text-xl font-bold mb-4">✅ Finalizados</h2>
        <div id="completed-orders-list" class="space-y-3 opacity-75"></div>
    </div>
</div>

<div id="messageBox" class="fixed bottom-4 right-4 p-4 text-white rounded-lg shadow-lg z-50 hidden"></div>
<div id="newOrderNotification" class="notification-box hidden">🔔 Novo pedido chegou!</div>

<script type="module">
    import { db, auth, collection, doc, getDocs, updateDoc, query, where, orderBy, onSnapshot, Timestamp, COLLECTIONS } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let activeOrders = [];
    let completedOrders = [];
    let restaurantProfile = {};
    let lastOrderCount = 0;

    const activeList = document.getElementById('active-orders-list');
    const completedList = document.getElementById('completed-orders-list');
    const messageBox = document.getElementById('messageBox');
    const notification = document.getElementById('newOrderNotification');

    function showMessage(msg, type = 'success') {
        messageBox.textContent = msg;
        messageBox.classList.remove('hidden', 'bg-green-500', 'bg-red-500');
        messageBox.classList.add(type === 'success' ? 'bg-green-500' : 'bg-red-500');
        setTimeout(() => messageBox.classList.add('hidden'), 3000);
    }

    function showNotification() {
        notification.classList.remove('hidden');
        setTimeout(() => notification.classList.add('show'), 10);
        try { new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3').play(); } catch(e) {}
        setTimeout(() => {
            notification.classList.remove('show');
            setTimeout(() => notification.classList.add('hidden'), 500);
        }, 5000);
    }

    async function loadRestaurantProfile() {
        const docRef = doc(db, COLLECTIONS.RESTAURANT_PROFILE, 'main');
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) restaurantProfile = docSnap.data();
    }

    function getDeliveryFee(order) {
        return order.deliveryFee || 5.00;
    }

    function renderOrders() {
        activeList.innerHTML = '';
        if (activeOrders.length === 0) {
            activeList.innerHTML = '<p class="text-center text-gray-500">Nenhum pedido ativo</p>';
        } else {
            activeOrders.forEach(order => {
                const div = createOrderCard(order, true);
                activeList.appendChild(div);
            });
        }

        completedList.innerHTML = '';
        if (completedOrders.length === 0) {
            completedList.innerHTML = '<p class="text-center text-gray-400 italic">Nenhum pedido finalizado</p>';
        } else {
            completedOrders.forEach(order => {
                const div = createOrderCard(order, false);
                completedList.appendChild(div);
            });
        }
    }

    function createOrderCard(order, isActive) {
        const div = document.createElement('div');
        div.className = `bg-white p-5 rounded-xl shadow-sm border cursor-pointer hover:shadow-md transition-all ${order.isNew ? 'new-order' : ''}`;
        div.dataset.orderId = order.id;
        
        let itemsHtml = '';
        order.items?.forEach(item => {
            let complementsHtml = '';
            for (const group in item.complements) {
                complementsHtml += `<p class="text-xs font-bold mt-1">${group}:</p>`;
                complementsHtml += `<ul class="text-xs text-gray-500 pl-4">`;
                complementsHtml += item.complements[group].map(c => `<li>${c.name} (+R$ ${c.price.toFixed(2).replace('.', ',')})</li>`).join('');
                complementsHtml += `</ul>`;
            }
            itemsHtml += `
                <li class="text-sm border-b py-2">
                    <div class="flex justify-between">
                        <span>${item.quantity}x ${item.product.name}</span>
                        <span class="font-bold">R$ ${item.totalPrice.toFixed(2).replace('.', ',')}</span>
                    </div>
                    ${complementsHtml}
                </li>
            `;
        });

        const deliveryFee = getDeliveryFee(order);
        const statusColors = {
            'Pendente': 'bg-yellow-100 text-yellow-800',
            'Preparando': 'bg-blue-100 text-blue-800',
            'Saiu para entrega': 'bg-green-100 text-green-800',
            'Entregue': 'bg-gray-100 text-gray-600',
            'Cancelado': 'bg-red-100 text-red-800'
        };
        
        let actionButtons = '';
        if (isActive && order.status !== 'Cancelado' && order.status !== 'Entregue') {
            actionButtons = `
                <div class="flex gap-2 mt-3">
                    <button class="update-status-btn bg-blue-500 text-white px-3 py-1 rounded-full text-sm hover:bg-blue-600" data-status="Preparando">👨‍🍳 Preparar</button>
                    <button class="update-status-btn bg-green-500 text-white px-3 py-1 rounded-full text-sm hover:bg-green-600" data-status="Saiu para entrega">🛵 Despachar</button>
                    <button class="print-order-btn bg-gray-200 text-gray-800 px-3 py-1 rounded-full text-sm">🖨️ Imprimir</button>
                    <button class="cancel-order-btn bg-red-500 text-white px-3 py-1 rounded-full text-sm">❌ Cancelar</button>
                </div>
            `;
        } else if (!isActive) {
            actionButtons = `<button class="print-order-btn bg-gray-200 text-gray-800 px-3 py-1 rounded-full text-sm mt-2">🖨️ Imprimir</button>`;
        }

        div.innerHTML = `
            <div class="flex justify-between items-start flex-wrap gap-2">
                <div>
                    <h4 class="text-xl font-bold">Pedido #${order.id.slice(-6)}</h4>
                    <p class="text-sm text-gray-500">${order.date}</p>
                </div>
                <div>
                    <span class="inline-block px-3 py-1 rounded-full text-sm font-semibold ${statusColors[order.status] || 'bg-gray-100'}">
                        ${order.status}
                    </span>
                </div>
            </div>
            <div class="order-details hidden mt-4 pt-4 border-t">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <p class="font-bold">Cliente:</p>
                        <p>${order.customer.name}</p>
                        <p>📞 ${order.customer.phone}</p>
                        <p>📍 ${order.customer.address}</p>
                        ${order.customer.complement ? `<p>🏠 ${order.customer.complement}</p>` : ''}
                    </div>
                    <div>
                        <p class="font-bold">Pagamento:</p>
                        <p>💳 ${order.paymentMethod}</p>
                        <p class="font-bold mt-2">Itens:</p>
                        <ul class="text-sm space-y-1">${itemsHtml}</ul>
                    </div>
                </div>
                <div class="border-t pt-2 flex justify-between items-center">
                    <div>
                        <p class="text-sm">Subtotal: R$ ${order.subtotal?.toFixed(2).replace('.', ',') || '0,00'}</p>
                        <p class="text-sm">Taxa entrega: R$ ${deliveryFee.toFixed(2).replace('.', ',')}</p>
                    </div>
                    <p class="text-xl font-bold text-green-600">Total: R$ ${order.total?.toFixed(2).replace('.', ',') || '0,00'}</p>
                </div>
                ${actionButtons}
            </div>
        `;
        return div;
    }

    function printOrder(order) {
        const deliveryFee = getDeliveryFee(order);
        const printWindow = window.open('', '_blank');
        let itemsHtml = '';
        
        order.items?.forEach(item => {
            let complementsHtml = '';
            for (const group in item.complements) {
                complementsHtml += `<div style="font-weight:bold; font-size:12px;">${group}:</div>`;
                complementsHtml += `<ul style="padding-left:15px;">`;
                complementsHtml += item.complements[group].map(c => `<li>${c.name} (+R$ ${c.price.toFixed(2).replace('.', ',')})</li>`).join('');
                complementsHtml += `</ul>`;
            }
            itemsHtml += `
                <div style="border-bottom:1px solid #ccc; padding:8px 0;">
                    <div style="display:flex; justify-content:space-between;">
                        <span>${item.quantity}x ${item.product.name}</span>
                        <span>R$ ${item.totalPrice.toFixed(2).replace('.', ',')}</span>
                    </div>
                    ${complementsHtml}
                </div>
            `;
        });

        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head><title>Pedido #${order.id.slice(-6)}</title>
            <style>
                body { font-family: sans-serif; padding: 20px; max-width: 300px; margin: 0 auto; }
                @media print { @page { margin: 0; } body { margin: 5mm; } }
            </style>
            </head>
            <body>
                <div style="text-align:center; border-bottom:2px solid #333; padding-bottom:10px;">
                    ${restaurantProfile.logo ? `<img src="${restaurantProfile.logo}" style="max-height:50px;">` : ''}
                    <h2>${restaurantProfile.name || 'Delivery'}</h2>
                </div>
                <h3 style="text-align:center;">Pedido #${order.id.slice(-6)}</h3>
                <p><strong>Cliente:</strong> ${order.customer.name}</p>
                <p><strong>Telefone:</strong> ${order.customer.phone}</p>
                <p><strong>Endereço:</strong> ${order.customer.address}</p>
                <hr>
                ${itemsHtml}
                <hr>
                <div style="display:flex; justify-content:space-between;">
                    <span>Taxa entrega:</span>
                    <span>R$ ${deliveryFee.toFixed(2).replace('.', ',')}</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:bold;">
                    <span>TOTAL:</span>
                    <span>R$ ${order.total?.toFixed(2).replace('.', ',') || '0,00'}</span>
                </div>
                <p><strong>Pagamento:</strong> ${order.paymentMethod}</p>
                <p style="text-align:center; font-size:11px; margin-top:20px;">${new Date().toLocaleString()}</p>
            </body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    }

    async function updateOrderStatus(orderId, newStatus) {
        const orderRef = doc(db, COLLECTIONS.ORDERS, orderId);
        await updateDoc(orderRef, { status: newStatus });
        showMessage(`Status atualizado para ${newStatus}`, 'success');
    }

    async function cancelOrder(orderId) {
        const orderRef = doc(db, COLLECTIONS.ORDERS, orderId);
        await updateDoc(orderRef, { status: 'Cancelado' });
        showMessage('Pedido cancelado', 'success');
    }

    function startOrdersListener() {
        const q = query(collection(db, COLLECTIONS.ORDERS), orderBy('createdAt', 'desc'));
        
        onSnapshot(q, (snapshot) => {
            const newActive = [];
            const newCompleted = [];
            const newOrderIds = new Set();
            
            snapshot.docChanges().forEach(change => {
                if (change.type === 'added') {
                    newOrderIds.add(change.doc.id);
                }
            });
            
            snapshot.forEach(doc => {
                const order = { id: doc.id, ...doc.data() };
                const isNew = newOrderIds.has(order.id);
                order.isNew = isNew;
                
                if (order.status === 'Cancelado' || order.status === 'Entregue' || order.status === 'Finalizado') {
                    newCompleted.push(order);
                } else {
                    newActive.push(order);
                }
            });
            
            const previousCount = activeOrders.length;
            activeOrders = newActive;
            completedOrders = newCompleted;
            renderOrders();
            
            if (activeOrders.length > previousCount) {
                showNotification();
            }
        });
    }

    // Event delegation
    document.addEventListener('click', async (e) => {
        const orderDiv = e.target.closest('[data-order-id]');
        if (!orderDiv) return;
        
        const orderId = orderDiv.dataset.orderId;
        const details = orderDiv.querySelector('.order-details');
        
        if (e.target.closest('.print-order-btn')) {
            const order = [...activeOrders, ...completedOrders].find(o => o.id === orderId);
            if (order) printOrder(order);
        }
        else if (e.target.closest('.cancel-order-btn')) {
            if (confirm('Cancelar este pedido?')) await cancelOrder(orderId);
        }
        else if (e.target.closest('.update-status-btn')) {
            const newStatus = e.target.closest('.update-status-btn').dataset.status;
            await updateOrderStatus(orderId, newStatus);
        }
        else if (details && !e.target.closest('button')) {
            details.classList.toggle('hidden');
        }
    });

    // Autenticação
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        await loadRestaurantProfile();
        startOrdersListener();
    });
</script>
</body>
</html>

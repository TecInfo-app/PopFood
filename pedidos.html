<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - Gerenciador de Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; }
        .modal-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .notification-box {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: #ef4444; color: white; padding: 1rem 2rem;
            border-radius: 9999px; z-index: 1000; opacity: 0; transition: opacity 0.5s;
        }
        .notification-box.show { opacity: 1; }
        .new-order-highlight { background-color: #fff3e0 !important; }
        .dispatched-order-highlight { background-color: #e0f2fe !important; }
    </style>
</head>
<body class="p-4 bg-gray-100 min-h-screen">

    <div id="app-container" class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-5xl mx-auto my-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Painel de Pedidos</h1>
        
        <div id="my-orders-list" class="space-y-4 mb-10"></div>
        <div id="finalized-orders-list" class="space-y-3 opacity-75"></div>
    </div>

    <div id="newOrderNotification" class="notification-box hidden">Novo pedido chegou!</div>
    
    <script type="module">
        import { db } from './firebase-config.js';
        import { ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Variáveis globais
        window.myOrders = [];

        function buildOrderHtml(order, isActive = true) {
            let itemsHtml = (order.items && Array.isArray(order.items)) 
                ? order.items.map(item => `
                    <li class="text-sm text-gray-600 flex justify-between">
                        <span>${item.quantity}x ${item.product?.name || 'Produto'}</span>
                        <span class="font-bold">R$ ${(item.totalPrice || 0).toFixed(2).replace('.', ',')}</span>
                    </li>`).join('')
                : '<li class="text-sm text-gray-400 italic">Sem itens.</li>';

            let actionButtonsHtml = isActive ? `
                <button class="dispatch-order-btn bg-blue-500 text-white font-bold py-1 px-3 rounded-full text-sm">Despachar</button>
                <button class="finish-order-btn bg-green-500 text-white font-bold py-1 px-3 rounded-full text-sm">Finalizar</button>
            ` : `<span class="text-xs bg-gray-100 px-2 py-1 rounded">Status: ${order.status}</span>`;

            return `
                <div class="flex justify-between items-center p-4">
                    <h4 class="font-bold text-gray-800">Pedido #${order.id.slice(-6)}</h4>
                    <div class="flex gap-2">${actionButtonsHtml}</div>
                </div>
                <div class="order-details p-4 border-t hidden">
                    <ul class="space-y-1">${itemsHtml}</ul>
                </div>
            `;
        }

        // Função render simplificada
        window.renderMyOrdersPage = () => {
            const list = document.getElementById('my-orders-list');
            list.innerHTML = window.myOrders.map(order => {
                const div = document.createElement('div');
                div.className = 'bg-white rounded-xl shadow-sm border p-2 cursor-pointer';
                div.dataset.orderId = order.id;
                div.innerHTML = buildOrderHtml(order, true);
                return div.outerHTML;
            }).join('');
        };

        // Firebase Listener
        onValue(ref(db, 'myOrders'), (snapshot) => {
            const data = snapshot.val();
            window.myOrders = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            renderMyOrdersPage();
        });

        // Delegação de eventos
        document.addEventListener('click', (e) => {
            const btn = e.target;
            const orderId = btn.closest('[data-order-id]')?.dataset.orderId;
            if (!orderId) return;

            if (btn.classList.contains('finish-order-btn')) {
                update(ref(db, `myOrders/${orderId}`), { status: 'Finalizado' });
            } else if (btn.classList.contains('dispatch-order-btn')) {
                update(ref(db, `myOrders/${orderId}`), { status: 'Despachado' });
            }
        });
    </script>
</body>
</html>

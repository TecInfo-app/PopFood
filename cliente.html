<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopFood - Cardápio Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; }
        .product-card { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .modal-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="p-4 bg-gray-100 min-h-screen">

<div id="app-container" class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-5xl mx-auto my-8">

    <!-- Carrossel de Banners -->
    <div id="carousel-container" class="w-full max-w-2xl mx-auto overflow-hidden relative rounded-xl aspect-[16/9] bg-gray-200 hidden mb-6 shadow-md">
        <div id="carousel-slides" class="w-full h-full flex transition-transform duration-700 ease-in-out"></div>
    </div>

    <div id="customer-page">
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <div class="flex items-center justify-between gap-4 mb-4">
                <div class="flex items-center justify-center flex-1">
                    <img id="restaurantLogo" src="#" alt="Logo" class="h-12 hidden mr-4">
                    <h1 class="text-3xl font-bold text-gray-800">Cardápio</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button id="openProfileBtn" class="bg-white p-2 rounded-full shadow-lg text-gray-600 hover:text-gray-800" title="Minha Conta">
                        <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    </button>
                    <div class="relative">
                        <button id="openCartBtn" class="bg-white p-2 rounded-full shadow-lg text-gray-600 hover:text-gray-800">
                            <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                        </button>
                        <span id="cart-count" class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold text-white bg-red-600 rounded-full hidden">0</span>
                    </div>
                </div>
            </div>
            <div id="restaurant-info-customer" class="text-center mt-4">
                <h2 id="restaurant-name-customer" class="text-xl font-bold text-gray-800 mb-1 hidden"></h2>
                <p id="restaurant-description-customer" class="text-gray-600 mb-2 hidden"></p>
                <div id="contact-info-customer" class="text-sm text-gray-500 space-y-1">
                    <p id="restaurant-phone-customer" class="hidden">📞 <a href="#" class="hover:underline"></a></p>
                    <p id="restaurant-address-customer" class="hidden">📍 <span></span></p>
                    <p id="restaurant-email-customer" class="hidden">✉️ <a href="#" class="hover:underline"></a></p>
                    <p id="restaurant-hours-customer" class="hidden">🕒 <span></span></p>
                </div>
            </div>
        </div>

        <div id="aviso-loja-fechada" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg text-center font-semibold mb-4">
            ⚠️ Fora do horário de funcionamento. Estamos fechados no momento!
        </div>

        <div id="customerProductList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="text-center text-gray-500" id="loadingIndicatorCustomer">Carregando cardápio...</div>
        </div>
    </div>

    <div id="messageBox" class="fixed bottom-4 right-4 p-4 text-white rounded-lg shadow-lg z-50 hidden transition-all duration-300"></div>
</div>

<!-- Modal de Login -->
<div id="login-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm modal-enter">
        <div class="flex justify-between items-center mb-4 border-b pb-4">
            <h3 class="text-2xl font-bold">Acessar Conta</h3>
            <button id="closeLoginModalBtn" class="text-gray-500 hover:text-gray-800">✕</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="loginName" placeholder="Seu nome completo" class="w-full p-3 border rounded-lg">
            <input type="tel" id="loginPhone" placeholder="WhatsApp (99) 99999-9999" class="w-full p-3 border rounded-lg">
            <button id="submitLoginBtn" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700">Entrar</button>
        </div>
    </div>
</div>

<!-- Modal de Perfil -->
<div id="profile-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-2xl modal-enter">
        <div class="flex justify-between items-center mb-4 border-b pb-4">
            <h3 class="text-2xl font-bold">Minha Conta</h3>
            <button id="closeProfileModalBtn" class="text-gray-500 hover:text-gray-800">✕</button>
        </div>
        <div class="max-h-[65vh] overflow-y-auto p-2">
            <div class="bg-gray-50 p-4 rounded-xl mb-6">
                <p><strong>Nome:</strong> <span id="profile-name"></span></p>
                <p><strong>WhatsApp:</strong> <span id="profile-phone"></span></p>
                <p><strong>Endereço:</strong> <span id="profile-address"></span></p>
            </div>
            <h4 class="text-xl font-bold mb-4">Meus Pedidos</h4>
            <div id="profile-orders-list" class="space-y-4"></div>
        </div>
        <div class="mt-4 pt-4 border-t flex justify-end">
            <button id="logoutBtn" class="bg-red-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-600">Sair</button>
        </div>
    </div>
</div>

<!-- Modal de Detalhe do Produto -->
<div id="product-detail-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-2xl modal-enter">
        <div class="flex justify-between items-center mb-4 border-b pb-4">
            <h3 id="modal-product-name" class="text-2xl font-bold"></h3>
            <button id="closeProductDetailModalBtn" class="text-gray-500 hover:text-gray-800">✕</button>
        </div>
        <div class="max-h-[60vh] overflow-y-auto mb-4 p-2">
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <img id="modal-product-image" src="#" class="w-full md:w-1/3 h-48 object-cover rounded-xl border">
                <div class="flex-1">
                    <p id="modal-product-description" class="text-gray-600 mb-2"></p>
                    <p class="text-2xl font-bold text-green-600">Preço: <span id="modal-product-price">R$ 0,00</span></p>
                </div>
            </div>
            <div id="modal-complements-list" class="space-y-6"></div>
        </div>
        <div class="mt-4 pt-4 border-t flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <button id="quantity-minus" class="bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded-full hover:bg-gray-300">-</button>
                <span id="quantity-display" class="text-xl font-bold">1</span>
                <button id="quantity-plus" class="bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded-full hover:bg-gray-300">+</button>
            </div>
            <button id="addToCartBtn" class="w-full sm:w-auto bg-green-600 text-white font-bold py-3 px-6 rounded-lg shadow-md hover:bg-green-700">Adicionar ao Carrinho</button>
        </div>
    </div>
</div>

<!-- Modal do Carrinho -->
<div id="cart-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-2xl modal-enter">
        <div class="flex justify-between items-center mb-4 border-b pb-4">
            <h3 class="text-2xl font-bold">Seu Carrinho</h3>
            <button id="closeCartModalBtn" class="text-gray-500 hover:text-gray-800">✕</button>
        </div>
        <div id="cart-items-list" class="max-h-[60vh] overflow-y-auto mb-4 space-y-4"></div>
        <div id="cart-summary" class="mt-4 pt-4 border-t flex justify-between items-center text-xl font-bold">
            <span>Total:</span>
            <span id="cart-total-price">R$ 0,00</span>
        </div>
        <button id="checkoutBtn" class="mt-4 w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow-md hover:bg-green-700">Continuar</button>
    </div>
</div>

<!-- Modal de Dados do Cliente -->
<div id="customer-info-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-lg modal-enter flex flex-col max-h-[90vh]">
        <div class="flex justify-between items-center mb-4 border-b pb-4">
            <h3 class="text-2xl font-bold">Seus Dados</h3>
            <button id="closeCustomerInfoModalBtn" class="text-gray-500 hover:text-gray-800">✕</button>
        </div>
        <div class="space-y-4 overflow-y-auto flex-1">
            <input type="text" id="customerName" placeholder="Nome completo" class="w-full p-3 border rounded-lg">
            <input type="tel" id="customerPhone" placeholder="WhatsApp (99) 99999-9999" class="w-full p-3 border rounded-lg">
            <input type="email" id="customerEmail" placeholder="Email (opcional)" class="w-full p-3 border rounded-lg">
            <input type="text" id="customerCep" placeholder="CEP" class="w-full p-3 border rounded-lg">
            <input type="text" id="customerAddress" placeholder="Endereço" class="w-full p-3 border rounded-lg">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="customerNumber" placeholder="Número" class="p-3 border rounded-lg">
                <input type="text" id="customerComplement" placeholder="Complemento" class="p-3 border rounded-lg">
            </div>
            <textarea id="customerReference" placeholder="Ponto de referência" rows="2" class="w-full p-3 border rounded-lg"></textarea>
        </div>
        <div class="mt-6 flex justify-between gap-4 border-t pt-4">
            <button id="backToCartBtn" class="w-1/3 bg-gray-300 text-gray-800 font-bold py-3 rounded-lg hover:bg-gray-400">Voltar</button>
            <button id="continueToPaymentBtn" class="w-2/3 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700">Continuar</button>
        </div>
    </div>
</div>

<!-- Modal de Pagamento -->
<div id="payment-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm modal-enter">
        <div class="flex justify-between items-center mb-4 border-b pb-4">
            <h3 class="text-2xl font-bold">Pagamento</h3>
            <button id="closePaymentModalBtn" class="text-gray-500 hover:text-gray-800">✕</button>
        </div>
        <p class="text-xl font-bold text-green-600 text-center" id="payment-total-price">R$ 0,00</p>
        <div class="grid grid-cols-1 gap-2 mt-4">
            <button class="payment-option-btn bg-gray-200 text-gray-800 font-bold py-3 rounded-lg hover:bg-gray-300" data-payment="Cartão">💳 Cartão</button>
            <button class="payment-option-btn bg-gray-200 text-gray-800 font-bold py-3 rounded-lg hover:bg-gray-300" data-payment="Dinheiro">💰 Dinheiro</button>
            <button class="payment-option-btn bg-gray-200 text-gray-800 font-bold py-3 rounded-lg hover:bg-gray-300" data-payment="Pix">📱 Pix</button>
        </div>
        <button id="confirmOrderBtn" class="mt-6 w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 disabled:bg-gray-400" disabled>Confirmar Pedido</button>
    </div>
</div>

<!-- Modal de Confirmação -->
<div id="confirmationModal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm modal-enter">
        <h3 id="confirmationModalTitle" class="text-xl font-bold mb-4">Confirmação</h3>
        <p id="confirmationModalMessage" class="text-gray-600 mb-6"></p>
        <div class="flex justify-end gap-2">
            <button id="cancelConfirmationBtn" class="bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg">Cancelar</button>
            <button id="confirmActionBtn" class="bg-red-600 text-white font-bold py-2 px-4 rounded-lg">Confirmar</button>
        </div>
    </div>
</div>

<script type="module">
    import { 
        db, auth, collection, doc, getDocs, getDoc, addDoc, updateDoc, 
        query, where, orderBy, onSnapshot, Timestamp, COLLECTIONS 
    } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Estado Global
    let allProducts = [];
    let allCategories = [];
    let productComplementsCache = {};
    let cart = [];
    let myOrders = [];
    let restaurantProfile = {};
    let customerInfo = null;
    let selectedProductForCart = null;
    let selectedComplements = {};
    let currentQuantity = 1;
    let selectedPaymentMethod = null;
    let totalCartPrice = 0;
    let confirmationCallback = null;
    let unsubscribeProducts = null;
    let unsubscribeOrders = null;

    // DOM Elements
    const customerProductList = document.getElementById('customerProductList');
    const loadingIndicator = document.getElementById('loadingIndicatorCustomer');
    const messageBox = document.getElementById('messageBox');
    const cartCount = document.getElementById('cart-count');
    const openCartBtn = document.getElementById('openCartBtn');
    const openProfileBtn = document.getElementById('openProfileBtn');
    
    // Funções Auxiliares
    function showMessage(message, type = 'success') {
        messageBox.textContent = message;
        messageBox.classList.remove('hidden', 'bg-green-500', 'bg-red-500', 'bg-yellow-500');
        if (type === 'success') messageBox.classList.add('bg-green-500');
        else if (type === 'error') messageBox.classList.add('bg-red-500');
        else messageBox.classList.add('bg-yellow-500');
        setTimeout(() => messageBox.classList.add('hidden'), 3000);
    }

    function toggleModal(modal, show) {
        show ? modal.classList.remove('hidden') : modal.classList.add('hidden');
    }

    // Salvar carrinho no localStorage (persistência local)
    function saveCart() {
        localStorage.setItem('cart_' + (customerInfo?.phone || 'guest'), JSON.stringify(cart));
    }

    function loadCart() {
        const saved = localStorage.getItem('cart_' + (customerInfo?.phone || 'guest'));
        if (saved) cart = JSON.parse(saved);
        updateCartCount();
    }

    function updateCartCount() {
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        cartCount.textContent = total;
        cartCount.classList.toggle('hidden', total === 0);
    }

    // Carregar dados do Firebase
    async function loadRestaurantProfile() {
        const docRef = doc(db, COLLECTIONS.RESTAURANT_PROFILE, 'main');
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            restaurantProfile = docSnap.data();
            renderRestaurantInfo();
            initCarousel();
            checkStoreHours();
        }
    }

    function renderRestaurantInfo() {
        const logo = document.getElementById('restaurantLogo');
        const nameEl = document.getElementById('restaurant-name-customer');
        const descEl = document.getElementById('restaurant-description-customer');
        const phoneEl = document.getElementById('restaurant-phone-customer');
        const addressEl = document.getElementById('restaurant-address-customer');
        const emailEl = document.getElementById('restaurant-email-customer');
        const hoursEl = document.getElementById('restaurant-hours-customer');

        if (restaurantProfile.logo) {
            logo.src = restaurantProfile.logo;
            logo.classList.remove('hidden');
        }
        if (restaurantProfile.show?.name && restaurantProfile.name) {
            nameEl.textContent = restaurantProfile.name;
            nameEl.classList.remove('hidden');
        }
        if (restaurantProfile.show?.description && restaurantProfile.description) {
            descEl.textContent = restaurantProfile.description;
            descEl.classList.remove('hidden');
        }
        if (restaurantProfile.show?.phone && restaurantProfile.phone) {
            phoneEl.querySelector('a').textContent = restaurantProfile.phone;
            phoneEl.querySelector('a').href = `tel:${restaurantProfile.phone}`;
            phoneEl.classList.remove('hidden');
        }
        if (restaurantProfile.show?.address && restaurantProfile.address) {
            addressEl.querySelector('span').textContent = restaurantProfile.address;
            addressEl.classList.remove('hidden');
        }
        if (restaurantProfile.show?.email && restaurantProfile.email) {
            emailEl.querySelector('a').textContent = restaurantProfile.email;
            emailEl.querySelector('a').href = `mailto:${restaurantProfile.email}`;
            emailEl.classList.remove('hidden');
        }
        if (restaurantProfile.show?.hours && restaurantProfile.openTime) {
            hoursEl.querySelector('span').textContent = `${restaurantProfile.openTime} às ${restaurantProfile.closeTime}`;
            hoursEl.classList.remove('hidden');
        }
    }

    function initCarousel() {
        const banners = restaurantProfile.banners?.filter(b => b) || [];
        if (banners.length === 0) return;
        
        const container = document.getElementById('carousel-container');
        const slidesWrapper = document.getElementById('carousel-slides');
        slidesWrapper.innerHTML = '';
        
        banners.forEach(src => {
            const slide = document.createElement('div');
            slide.className = 'min-w-full h-full';
            slide.innerHTML = `<img src="${src}" class="w-full h-full object-cover">`;
            slidesWrapper.appendChild(slide);
        });
        
        container.classList.remove('hidden');
        
        if (banners.length > 1) {
            let index = 0;
            setInterval(() => {
                index = (index + 1) % banners.length;
                slidesWrapper.style.transform = `translateX(-${index * 100}%)`;
            }, 15000);
        }
    }

    function checkStoreHours() {
        const aviso = document.getElementById('aviso-loja-fechada');
        if (!restaurantProfile.openTime || !restaurantProfile.closeTime) return;
        
        const now = new Date();
        const current = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        let isOpen = false;
        
        if (restaurantProfile.openTime <= restaurantProfile.closeTime) {
            isOpen = current >= restaurantProfile.openTime && current < restaurantProfile.closeTime;
        } else {
            isOpen = current >= restaurantProfile.openTime || current < restaurantProfile.closeTime;
        }
        
        aviso.classList.toggle('hidden', isOpen);
    }

    setInterval(checkStoreHours, 30000);

    // Produtos e Cardápio
    function startProductsListener() {
        unsubscribeProducts = onSnapshot(collection(db, COLLECTIONS.PRODUCTS), (snapshot) => {
            allProducts = [];
            snapshot.forEach(doc => {
                allProducts.push({ id: doc.id, ...doc.data() });
            });
            loadCategoriesAndRender();
        });
    }

    async function loadCategoriesAndRender() {
        const catSnapshot = await getDocs(collection(db, COLLECTIONS.CATEGORIES));
        allCategories = [];
        catSnapshot.forEach(doc => {
            allCategories.push({ id: doc.id, ...doc.data() });
        });
        
        const compSnapshot = await getDocs(collection(db, COLLECTIONS.COMPLEMENTS));
        productComplementsCache = {};
        compSnapshot.forEach(doc => {
            productComplementsCache[doc.id] = doc.data().groups || [];
        });
        
        renderProductList();
    }

    function renderProductList() {
        const activeProducts = allProducts.filter(p => !p.paused);
        if (activeProducts.length === 0) {
            customerProductList.innerHTML = '<div class="text-center text-gray-500 col-span-full">Nenhum item disponível.</div>';
            return;
        }

        const productsByCategory = {};
        activeProducts.forEach(product => {
            const category = allCategories.find(c => c.id === product.categoryId);
            const catName = category?.name || 'Sem Categoria';
            if (!productsByCategory[catName]) productsByCategory[catName] = [];
            productsByCategory[catName].push(product);
        });

        customerProductList.innerHTML = '';
        for (const catName in productsByCategory) {
            const section = document.createElement('div');
            section.className = 'col-span-full mb-4 mt-6';
            section.innerHTML = `<h2 class="text-2xl font-bold text-gray-800">${catName}</h2>`;
            customerProductList.appendChild(section);
            
            productsByCategory[catName].forEach(product => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-md p-4 flex flex-col product-card';
                card.dataset.id = product.id;
                card.innerHTML = `
                    <img src="${product.image || ''}" class="w-full h-40 object-cover rounded-lg mb-4">
                    <h3 class="text-lg font-bold">${product.name}</h3>
                    ${product.pdvCode ? `<p class="text-xs text-gray-400">Cód: ${product.pdvCode}</p>` : ''}
                    <p class="text-sm text-gray-500 flex-1">${product.description || 'Sem descrição.'}</p>
                    <p class="text-xl font-bold text-green-600 mt-2">R$ ${(product.price || 0).toFixed(2).replace('.', ',')}</p>
                    <button data-id="${product.id}" class="add-to-cart-simple mt-4 bg-green-500 text-white font-bold py-2 rounded-lg hover:bg-green-600">Adicionar</button>
                `;
                customerProductList.appendChild(card);
            });
        }
        loadingIndicator.classList.add('hidden');
    }

    // Detalhe do Produto
    function openProductDetailModal(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product || product.paused) return;
        
        selectedProductForCart = product;
        selectedComplements = {};
        currentQuantity = 1;
        
        document.getElementById('modal-product-name').textContent = product.name;
        document.getElementById('modal-product-image').src = product.image || '';
        document.getElementById('modal-product-description').textContent = product.description || 'Sem descrição.';
        document.getElementById('quantity-display').textContent = '1';
        
        renderComplements(productId);
        updateModalPrice();
        toggleModal(document.getElementById('product-detail-modal'), true);
    }

    function renderComplements(productId) {
        const container = document.getElementById('modal-complements-list');
        const groups = productComplementsCache[productId] || [];
        container.innerHTML = '';
        
        if (groups.length === 0) {
            container.innerHTML = '<p class="text-gray-500 text-center">Sem complementos</p>';
            return;
        }
        
        groups.forEach((group, idx) => {
            if (group.paused) return;
            const activeOptions = group.options.filter(o => !o.paused);
            if (activeOptions.length === 0) return;
            
            const div = document.createElement('div');
            div.className = 'p-4 bg-gray-100 rounded-lg';
            div.innerHTML = `
                <h4 class="text-xl font-bold">${group.name}</h4>
                ${group.description ? `<p class="text-sm text-gray-500">${group.description}</p>` : ''}
                ${group.isMandatory ? `<p class="text-xs text-red-500">Obrigatório (${group.minSelection}-${group.maxSelection})</p>` : ''}
                <div id="complement-group-${idx}" class="space-y-2 mt-2"></div>
            `;
            container.appendChild(div);
            
            const optionsContainer = document.getElementById(`complement-group-${idx}`);
            const inputType = group.maxSelection === 1 ? 'radio' : 'checkbox';
            
            activeOptions.forEach(option => {
                const optDiv = document.createElement('div');
                optDiv.className = 'flex items-center justify-between bg-white p-3 rounded-lg border';
                optDiv.innerHTML = `
                    <label class="flex items-center flex-1 cursor-pointer">
                        <input type="${inputType}" name="group-${idx}" data-group="${idx}" data-opt-name="${option.name}" data-price="${option.price}" class="complement-input h-4 w-4 text-green-600">
                        <span class="ml-3 font-medium">${option.name}</span>
                    </label>
                    <span class="text-green-600">+ R$ ${(option.price || 0).toFixed(2).replace('.', ',')}</span>
                `;
                optionsContainer.appendChild(optDiv);
            });
        });
        
        document.querySelectorAll('.complement-input').forEach(input => {
            input.addEventListener('change', (e) => {
                const groupIdx = parseInt(e.target.dataset.group);
                const optName = e.target.dataset.optName;
                const price = parseFloat(e.target.dataset.price);
                
                if (!selectedComplements[groupIdx]) selectedComplements[groupIdx] = [];
                
                if (e.target.type === 'radio') {
                    selectedComplements[groupIdx] = [{ name: optName, price }];
                } else {
                    if (e.target.checked) {
                        selectedComplements[groupIdx].push({ name: optName, price });
                    } else {
                        selectedComplements[groupIdx] = selectedComplements[groupIdx].filter(o => o.name !== optName);
                    }
                }
                updateModalPrice();
            });
        });
    }

    function updateModalPrice() {
        if (!selectedProductForCart) return;
        let complementTotal = 0;
        for (const group in selectedComplements) {
            complementTotal += selectedComplements[group].reduce((s, o) => s + o.price, 0);
        }
        const total = (selectedProductForCart.price + complementTotal) * currentQuantity;
        document.getElementById('modal-product-price').textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        document.getElementById('addToCartBtn').textContent = `Adicionar (R$ ${total.toFixed(2).replace('.', ',')})`;
    }

    // Carrinho
    function addToCart() {
        if (!selectedProductForCart) return;
        
        // Validar complementos obrigatórios
        const groups = productComplementsCache[selectedProductForCart.id] || [];
        let isValid = true;
        
        for (let i = 0; i < groups.length; i++) {
            const group = groups[i];
            if (group.paused) continue;
            if (group.isMandatory) {
                const selected = selectedComplements[i] || [];
                if (selected.length < group.minSelection || selected.length > group.maxSelection) {
                    showMessage(`Selecione entre ${group.minSelection} e ${group.maxSelection} opções para "${group.name}"`, 'error');
                    isValid = false;
                    break;
                }
            }
        }
        if (!isValid) return;
        
        let complementTotal = 0;
        const complementsObj = {};
        for (const g in selectedComplements) {
            complementsObj[groups[g]?.name || 'Complementos'] = selectedComplements[g];
            complementTotal += selectedComplements[g].reduce((s, o) => s + o.price, 0);
        }
        
        const totalPrice = (selectedProductForCart.price + complementTotal) * currentQuantity;
        
        cart.push({
            product: selectedProductForCart,
            quantity: currentQuantity,
            complements: complementsObj,
            totalPrice: totalPrice
        });
        
        saveCart();
        updateCartCount();
        toggleModal(document.getElementById('product-detail-modal'), false);
        showMessage('Produto adicionado!', 'success');
    }

    function renderCartItems() {
        const container = document.getElementById('cart-items-list');
        const totalSpan = document.getElementById('cart-total-price');
        container.innerHTML = '';
        totalCartPrice = 0;
        
        if (cart.length === 0) {
            container.innerHTML = '<p class="text-center text-gray-500">Carrinho vazio</p>';
            totalSpan.textContent = 'R$ 0,00';
            return;
        }
        
        cart.forEach((item, idx) => {
            let complementsHtml = '';
            for (const group in item.complements) {
                complementsHtml += `<p class="text-xs font-bold mt-1">${group}:</p>`;
                complementsHtml += `<ul class="text-xs text-gray-500 pl-4">`;
                complementsHtml += item.complements[group].map(c => `<li>${c.name} (+R$ ${c.price.toFixed(2).replace('.', ',')})</li>`).join('');
                complementsHtml += `</ul>`;
            }
            
            const div = document.createElement('div');
            div.className = 'bg-white p-4 rounded-lg shadow-sm flex gap-4 border';
            div.innerHTML = `
                <img src="${item.product.image}" class="w-16 h-16 object-cover rounded">
                <div class="flex-1">
                    <h4 class="font-bold">${item.product.name}</h4>
                    ${complementsHtml}
                    <p class="text-green-600 font-bold">R$ ${item.totalPrice.toFixed(2).replace('.', ',')}</p>
                </div>
                <div class="flex flex-col items-center gap-1">
                    <div class="flex gap-2">
                        <button data-index="${idx}" class="qty-minus bg-gray-200 w-6 h-6 rounded-full">-</button>
                        <span class="font-bold">${item.quantity}</span>
                        <button data-index="${idx}" class="qty-plus bg-gray-200 w-6 h-6 rounded-full">+</button>
                    </div>
                    <button data-index="${idx}" class="remove-item text-red-500 text-sm">Remover</button>
                </div>
            `;
            container.appendChild(div);
            totalCartPrice += item.totalPrice;
        });
        
        // Calcular taxa de entrega
        const subtotal = totalCartPrice;
        const deliveryFee = getDeliveryFee();
        const totalFinal = subtotal + deliveryFee;
        
        totalSpan.innerHTML = `
            <div class="space-y-1 text-right">
                <div class="text-sm">Subtotal: R$ ${subtotal.toFixed(2).replace('.', ',')}</div>
                <div class="text-sm">Taxa entrega: R$ ${deliveryFee.toFixed(2).replace('.', ',')}</div>
                <div class="text-lg font-bold border-t pt-1">Total: R$ ${totalFinal.toFixed(2).replace('.', ',')}</div>
            </div>
        `;
    }
    
    function getDeliveryFee() {
        // Implementar lógica de taxa baseada na distância se disponível
        const fixedFee = restaurantProfile.deliveryFee || 5.00;
        return fixedFee;
    }

    function updateCartQuantity(index, delta) {
        if (!cart[index]) return;
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        } else {
            const basePrice = cart[index].product.price;
            let complementPrice = 0;
            for (const group in cart[index].complements) {
                complementPrice += cart[index].complements[group].reduce((s, o) => s + o.price, 0);
            }
            cart[index].totalPrice = (basePrice + complementPrice) * cart[index].quantity;
        }
        saveCart();
        renderCartItems();
        updateCartCount();
    }

    // Checkout e Pedido
    async function createOrder(customerData, paymentMethod, items, subtotal) {
        const deliveryFee = getDeliveryFee();
        const order = {
            id: Date.now().toString(),
            date: new Date().toLocaleString('pt-BR'),
            createdAt: Timestamp.now(),
            customer: {
                name: customerData.name,
                phone: customerData.phone,
                email: customerData.email || '',
                address: `${customerData.address}, ${customerData.number}`,
                complement: customerData.complement || '',
                reference: customerData.reference || '',
                cep: customerData.cep
            },
            paymentMethod: paymentMethod,
            items: items,
            subtotal: subtotal,
            deliveryFee: deliveryFee,
            total: subtotal + deliveryFee,
            status: 'Pendente'
        };
        
        await addDoc(collection(db, COLLECTIONS.ORDERS), order);
        
        // Salvar cliente
        const clientRef = doc(db, COLLECTIONS.CLIENTS, customerData.phone.replace(/\D/g, ''));
        await setDoc(clientRef, {
            name: customerData.name,
            phone: customerData.phone,
            email: customerData.email || '',
            address: `${customerData.address}, ${customerData.number}`,
            cep: customerData.cep,
            lastOrder: Timestamp.now()
        }, { merge: true });
        
        return order;
    }

    // Event Listeners
    customerProductList.addEventListener('click', (e) => {
        const card = e.target.closest('.product-card');
        const addBtn = e.target.closest('.add-to-cart-simple');
        
        if (card && !addBtn) {
            openProductDetailModal(card.dataset.id);
        } else if (addBtn) {
            const productId = addBtn.dataset.id;
            const product = allProducts.find(p => p.id === productId);
            const complements = productComplementsCache[productId] || [];
            const hasMandatory = complements.some(g => g.isMandatory && !g.paused);
            
            if (hasMandatory || complements.length > 0) {
                openProductDetailModal(productId);
            } else {
                cart.push({
                    product: product,
                    quantity: 1,
                    complements: {},
                    totalPrice: product.price
                });
                saveCart();
                updateCartCount();
                showMessage('Produto adicionado!', 'success');
            }
        }
    });

    document.getElementById('quantity-minus')?.addEventListener('click', () => {
        if (currentQuantity > 1) {
            currentQuantity--;
            document.getElementById('quantity-display').textContent = currentQuantity;
            updateModalPrice();
        }
    });
    
    document.getElementById('quantity-plus')?.addEventListener('click', () => {
        currentQuantity++;
        document.getElementById('quantity-display').textContent = currentQuantity;
        updateModalPrice();
    });
    
    document.getElementById('addToCartBtn')?.addEventListener('click', addToCart);
    document.getElementById('closeProductDetailModalBtn')?.addEventListener('click', () => 
        toggleModal(document.getElementById('product-detail-modal'), false));
    
    openCartBtn?.addEventListener('click', () => {
        renderCartItems();
        toggleModal(document.getElementById('cart-modal'), true);
    });
    
    document.getElementById('closeCartModalBtn')?.addEventListener('click', () => 
        toggleModal(document.getElementById('cart-modal'), false));
    
    document.getElementById('cart-items-list')?.addEventListener('click', (e) => {
        const minus = e.target.closest('.qty-minus');
        const plus = e.target.closest('.qty-plus');
        const remove = e.target.closest('.remove-item');
        
        if (minus) updateCartQuantity(parseInt(minus.dataset.index), -1);
        if (plus) updateCartQuantity(parseInt(plus.dataset.index), 1);
        if (remove) {
            const idx = parseInt(remove.dataset.index);
            cart.splice(idx, 1);
            saveCart();
            renderCartItems();
            updateCartCount();
        }
    });
    
    document.getElementById('checkoutBtn')?.addEventListener('click', () => {
        if (cart.length === 0) {
            showMessage('Carrinho vazio!', 'error');
            return;
        }
        toggleModal(document.getElementById('cart-modal'), false);
        toggleModal(document.getElementById('customer-info-modal'), true);
    });
    
    document.getElementById('backToCartBtn')?.addEventListener('click', () => {
        toggleModal(document.getElementById('customer-info-modal'), false);
        toggleModal(document.getElementById('cart-modal'), true);
    });
    
    document.getElementById('continueToPaymentBtn')?.addEventListener('click', () => {
        const name = document.getElementById('customerName').value.trim();
        const phone = document.getElementById('customerPhone').value.trim();
        const address = document.getElementById('customerAddress').value.trim();
        const number = document.getElementById('customerNumber').value.trim();
        
        if (!name || !phone || !address || !number) {
            showMessage('Preencha nome, telefone, endereço e número', 'error');
            return;
        }
        
        customerInfo = {
            name, phone,
            email: document.getElementById('customerEmail').value,
            cep: document.getElementById('customerCep').value,
            address, number,
            complement: document.getElementById('customerComplement').value,
            reference: document.getElementById('customerReference').value
        };
        
        const subtotal = cart.reduce((s, i) => s + i.totalPrice, 0);
        const deliveryFee = getDeliveryFee();
        const total = subtotal + deliveryFee;
        
        document.getElementById('payment-total-price').textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        selectedPaymentMethod = null;
        document.getElementById('confirmOrderBtn').disabled = true;
        
        toggleModal(document.getElementById('customer-info-modal'), false);
        toggleModal(document.getElementById('payment-modal'), true);
    });
    
    document.querySelectorAll('.payment-option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.payment-option-btn').forEach(b => 
                b.classList.remove('bg-green-500', 'text-white'));
            btn.classList.add('bg-green-500', 'text-white');
            selectedPaymentMethod = btn.dataset.payment;
            document.getElementById('confirmOrderBtn').disabled = false;
        });
    });
    
    document.getElementById('confirmOrderBtn')?.addEventListener('click', async () => {
        if (!selectedPaymentMethod) return;
        
        const subtotal = cart.reduce((s, i) => s + i.totalPrice, 0);
        const items = cart.map(item => ({
            product: {
                id: item.product.id,
                name: item.product.name,
                price: item.product.price,
                image: item.product.image
            },
            quantity: item.quantity,
            complements: item.complements,
            totalPrice: item.totalPrice
        }));
        
        await createOrder(customerInfo, selectedPaymentMethod, items, subtotal);
        
        cart = [];
        saveCart();
        updateCartCount();
        toggleModal(document.getElementById('payment-modal'), false);
        showMessage('Pedido realizado com sucesso!', 'success');
    });
    
    document.getElementById('closePaymentModalBtn')?.addEventListener('click', () =>
        toggleModal(document.getElementById('payment-modal'), false));
    
    // Inicialização
    async function init() {
        startProductsListener();
        await loadRestaurantProfile();
        loadCart();
        setInterval(checkStoreHours, 30000);
    }
    
    init();
</script>
</body>
</html>

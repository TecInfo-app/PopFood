<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Restaurante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7fafc; }
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .toggle-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .toggle-slider { background-color: #2563eb; }
        input:checked + .toggle-slider:before { transform: translateX(20px); }
        .loading-coords { display: inline-block; width: 16px; height: 16px; border: 2px solid #f3f3f3; border-top: 2px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .coord-info { font-size: 12px; color: #6b7280; margin-top: 4px; }
        .coord-info.success { color: #16a34a; }
        .coord-info.error { color: #dc2626; }
    </style>
</head>
<body class="p-4 bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-2xl mx-auto my-8">
    <div class="flex items-center gap-4 mb-6">
        <a href="index.html" class="text-gray-500 hover:text-gray-800">
            <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12" /></svg>
        </a>
        <h1 class="text-3xl font-bold text-gray-800">Perfil do Restaurante</h1>
    </div>

    <div class="space-y-6">
        <!-- Logo -->
        <div>
            <h2 class="text-xl font-bold mb-2">Logo</h2>
            <input type="file" id="logoInput" accept="image/*" class="w-full text-gray-500">
            <div id="logoPreviewContainer" class="mt-4 hidden">
                <img id="logoPreview" class="w-32 h-32 object-contain rounded-lg border p-2">
            </div>
        </div>

        <!-- Informações -->
        <div class="border-t pt-4">
            <h2 class="text-xl font-bold mb-4">Informações</h2>
            
            <div class="mb-4">
                <div class="flex justify-between items-center mb-1">
                    <label class="text-sm font-medium">Nome</label>
                    <label class="toggle-switch"><input type="checkbox" id="showNameToggle"><span class="toggle-slider"></span></label>
                </div>
                <input type="text" id="restaurantName" class="w-full p-3 border rounded-lg">
            </div>

            <div class="mb-4">
                <div class="flex justify-between items-center mb-1">
                    <label class="text-sm font-medium">Descrição</label>
                    <label class="toggle-switch"><input type="checkbox" id="showDescToggle"><span class="toggle-slider"></span></label>
                </div>
                <textarea id="restaurantDescription" rows="3" class="w-full p-3 border rounded-lg"></textarea>
            </div>

            <div class="mb-4">
                <div class="flex justify-between items-center mb-1">
                    <label class="text-sm font-medium">Telefone</label>
                    <label class="toggle-switch"><input type="checkbox" id="showPhoneToggle"><span class="toggle-slider"></span></label>
                </div>
                <input type="tel" id="restaurantPhone" class="w-full p-3 border rounded-lg">
            </div>

            <div class="mb-4">
                <div class="flex justify-between items-center mb-1">
                    <label class="text-sm font-medium">Endereço da Loja</label>
                    <label class="toggle-switch"><input type="checkbox" id="showAddressToggle"><span class="toggle-slider"></span></label>
                </div>
                <input type="text" id="restaurantCep" placeholder="CEP" class="w-full p-3 border rounded-lg mb-2">
                
                <div class="flex gap-2 mb-2">
                    <input type="text" id="restaurantAddress" placeholder="Endereço completo" class="flex-1 p-3 border rounded-lg">
                    <button id="searchCoordsBtn" type="button" class="bg-blue-500 text-white px-4 rounded-lg hover:bg-blue-600 transition-colors">
                        🔍 Buscar Coordenadas
                    </button>
                </div>
                
                <!-- Exibição das coordenadas -->
                <div id="coordsInfo" class="coord-info hidden">
                    <span id="coordsText"></span>
                    <span id="coordsLoading" class="loading-coords hidden"></span>
                </div>
                <input type="hidden" id="restaurantLat" value="">
                <input type="hidden" id="restaurantLng" value="">
            </div>

            <div class="mb-4">
                <div class="flex justify-between items-center mb-1">
                    <label class="text-sm font-medium">Email</label>
                    <label class="toggle-switch"><input type="checkbox" id="showEmailToggle"><span class="toggle-slider"></span></label>
                </div>
                <input type="email" id="restaurantEmail" class="w-full p-3 border rounded-lg">
            </div>

            <div class="mb-4">
                <div class="flex justify-between items-center mb-1">
                    <label class="text-sm font-medium">Horário</label>
                    <label class="toggle-switch"><input type="checkbox" id="showHoursToggle"><span class="toggle-slider"></span></label>
                </div>
                <div class="flex gap-4">
                    <input type="time" id="openTime" class="w-1/2 p-3 border rounded-lg">
                    <input type="time" id="closeTime" class="w-1/2 p-3 border rounded-lg">
                </div>
            </div>

            <!-- Banners -->
            <div class="border-t pt-4">
                <h2 class="text-xl font-bold mb-2">Banners Promocionais</h2>
                <p class="text-xs text-gray-500 mb-4">Até 3 imagens (16:9)</p>
                <div id="bannersContainer" class="space-y-4"></div>
            </div>

            <!-- Taxas de Entrega -->
            <div class="border-t pt-4">
                <button id="openDeliveryModalBtn" class="w-full bg-orange-500 text-white font-semibold py-3 rounded-lg hover:bg-orange-600">
                    Configurar Taxas por KM
                </button>
            </div>

            <button id="saveProfileBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mt-6 hover:bg-blue-700">
                Salvar Perfil
            </button>
        </div>
    </div>
</div>

<!-- Modal de Taxas -->
<div id="deliveryModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-md max-h-[85vh] flex flex-col">
        <div class="p-4 border-b flex justify-between items-center bg-orange-50">
            <h3 class="text-xl font-bold">Taxas por KM</h3>
            <button id="closeDeliveryModalBtn" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="p-6 overflow-y-auto space-y-3" id="ratesContainer"></div>
        <div class="p-4 border-t flex gap-3">
            <button id="cancelRatesBtn" class="w-1/2 py-2 bg-gray-200 rounded-lg">Cancelar</button>
            <button id="confirmRatesBtn" class="w-1/2 py-2 bg-orange-500 text-white rounded-lg">Confirmar</button>
        </div>
    </div>
</div>

<div id="messageBox" class="fixed bottom-4 right-4 p-4 text-white rounded-lg shadow-lg z-50 hidden"></div>

<script type="module">
    import { db, storage, auth, doc, getDoc, setDoc, updateDoc, collection, COLLECTIONS } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    let profile = {
        logo: null,
        name: '', description: '', phone: '', cep: '', address: '', email: '',
        openTime: '', closeTime: '', banners: [null, null, null], deliveryRates: {},
        latitude: null, longitude: null,
        show: { name: true, description: true, phone: true, address: true, email: true, hours: true }
    };
    let logoFile = null;
    let bannerFiles = [null, null, null];

    const saveBtn = document.getElementById('saveProfileBtn');
    const logoInput = document.getElementById('logoInput');
    const logoPreview = document.getElementById('logoPreview');
    const logoPreviewContainer = document.getElementById('logoPreviewContainer');
    const restaurantName = document.getElementById('restaurantName');
    const restaurantDescription = document.getElementById('restaurantDescription');
    const restaurantPhone = document.getElementById('restaurantPhone');
    const restaurantCep = document.getElementById('restaurantCep');
    const restaurantAddress = document.getElementById('restaurantAddress');
    const restaurantEmail = document.getElementById('restaurantEmail');
    const openTime = document.getElementById('openTime');
    const closeTime = document.getElementById('closeTime');
    const showNameToggle = document.getElementById('showNameToggle');
    const showDescToggle = document.getElementById('showDescToggle');
    const showPhoneToggle = document.getElementById('showPhoneToggle');
    const showAddressToggle = document.getElementById('showAddressToggle');
    const showEmailToggle = document.getElementById('showEmailToggle');
    const showHoursToggle = document.getElementById('showHoursToggle');
    const bannersContainer = document.getElementById('bannersContainer');
    const deliveryModal = document.getElementById('deliveryModal');
    const openDeliveryModalBtn = document.getElementById('openDeliveryModalBtn');
    const closeDeliveryModalBtn = document.getElementById('closeDeliveryModalBtn');
    const cancelRatesBtn = document.getElementById('cancelRatesBtn');
    const confirmRatesBtn = document.getElementById('confirmRatesBtn');
    const ratesContainer = document.getElementById('ratesContainer');
    const messageBox = document.getElementById('messageBox');
    const searchCoordsBtn = document.getElementById('searchCoordsBtn');
    const coordsInfo = document.getElementById('coordsInfo');
    const coordsText = document.getElementById('coordsText');
    const coordsLoading = document.getElementById('coordsLoading');
    const restaurantLat = document.getElementById('restaurantLat');
    const restaurantLng = document.getElementById('restaurantLng');

    function showMessage(msg, type = 'success') {
        messageBox.textContent = msg;
        messageBox.classList.remove('hidden', 'bg-green-500', 'bg-red-500');
        messageBox.classList.add(type === 'success' ? 'bg-green-500' : 'bg-red-500');
        setTimeout(() => messageBox.classList.add('hidden'), 3000);
    }

    // Buscar coordenadas pelo endereço
    async function buscarCoordenadasPorEndereco(endereco) {
        coordsLoading.classList.remove('hidden');
        coordsInfo.classList.remove('hidden');
        coordsText.textContent = 'Buscando coordenadas...';
        coordsText.className = 'text-gray-500';
        
        try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco + ", Brasil")}&limit=1`;
            const response = await fetch(url);
            const data = await response.json();
            
            coordsLoading.classList.add('hidden');
            
            if (data && data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lng = parseFloat(data[0].lon);
                
                restaurantLat.value = lat;
                restaurantLng.value = lng;
                
                coordsText.innerHTML = `📍 Coordenadas obtidas: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                coordsText.className = 'text-green-600';
                
                return { lat, lng };
            } else {
                coordsText.innerHTML = '❌ Não foi possível encontrar as coordenadas. Verifique o endereço.';
                coordsText.className = 'text-red-500';
                return null;
            }
        } catch (error) {
            coordsLoading.classList.add('hidden');
            coordsText.innerHTML = '❌ Erro ao buscar coordenadas. Tente novamente.';
            coordsText.className = 'text-red-500';
            console.error("Erro ao buscar coordenadas:", error);
            return null;
        }
    }

    // Buscar endereço pelo CEP (ViaCEP)
    async function buscarEnderecoPorCep(cep) {
        const cepLimpo = cep.replace(/\D/g, '');
        if (cepLimpo.length !== 8) {
            showMessage('CEP inválido. Digite 8 números.', 'error');
            return null;
        }
        
        try {
            const response = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
            const data = await response.json();
            
            if (data.erro) {
                showMessage('CEP não encontrado!', 'error');
                return null;
            }
            
            return {
                cep: data.cep,
                enderecoCompleto: `${data.logradouro}, ${data.bairro}, ${data.localidade} - ${data.uf}`
            };
        } catch (error) {
            console.error("Erro ao buscar CEP:", error);
            showMessage('Erro ao buscar CEP. Tente novamente.', 'error');
            return null;
        }
    }

    // Buscar CEP e preencher endereço
    restaurantCep.addEventListener('blur', async () => {
        let cep = restaurantCep.value.replace(/\D/g, '');
        if (cep.length === 8) {
            const enderecoData = await buscarEnderecoPorCep(cep);
            if (enderecoData) {
                restaurantAddress.value = enderecoData.enderecoCompleto + ', [NÚMERO]';
                showMessage('Endereço preenchido! Clique em "Buscar Coordenadas" para obter a localização.', 'success');
            }
        }
    });

    // Buscar coordenadas do endereço
    searchCoordsBtn.addEventListener('click', async () => {
        const endereco = restaurantAddress.value;
        if (!endereco) {
            showMessage('Preencha o endereço primeiro!', 'error');
            return;
        }
        await buscarCoordenadasPorEndereco(endereco);
    });

    // Verificar autenticação
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        await loadProfile();
    });

    async function loadProfile() {
        const docRef = doc(db, COLLECTIONS.RESTAURANT_PROFILE, 'main');
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            profile = { ...profile, ...docSnap.data() };
            if (!profile.show) profile.show = {};
            if (!profile.banners) profile.banners = [null, null, null];
            if (!profile.deliveryRates) profile.deliveryRates = {};
        }
        renderForm();
        renderBanners();
        displayCoordinates();
    }

    function renderForm() {
        if (profile.logo) {
            logoPreview.src = profile.logo;
            logoPreviewContainer.classList.remove('hidden');
        }
        restaurantName.value = profile.name || '';
        restaurantDescription.value = profile.description || '';
        restaurantPhone.value = profile.phone || '';
        restaurantCep.value = profile.cep || '';
        restaurantAddress.value = profile.address || '';
        restaurantEmail.value = profile.email || '';
        openTime.value = profile.openTime || '';
        closeTime.value = profile.closeTime || '';
        showNameToggle.checked = profile.show.name !== false;
        showDescToggle.checked = profile.show.description !== false;
        showPhoneToggle.checked = profile.show.phone !== false;
        showAddressToggle.checked = profile.show.address !== false;
        showEmailToggle.checked = profile.show.email !== false;
        showHoursToggle.checked = profile.show.hours !== false;
        
        if (profile.latitude && profile.longitude) {
            restaurantLat.value = profile.latitude;
            restaurantLng.value = profile.longitude;
        }
    }

    function displayCoordinates() {
        if (profile.latitude && profile.longitude) {
            coordsInfo.classList.remove('hidden');
            coordsText.innerHTML = `📍 Coordenadas salvas: ${profile.latitude.toFixed(6)}, ${profile.longitude.toFixed(6)}`;
            coordsText.className = 'text-green-600';
        }
    }

    function renderBanners() {
        bannersContainer.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            const div = document.createElement('div');
            div.className = 'bg-gray-50 p-3 rounded-lg border';
            div.innerHTML = `
                <label class="block text-sm font-semibold mb-1">Banner ${i+1}</label>
                <input type="file" class="banner-input" data-index="${i}" accept="image/*">
                <div class="banner-preview-container mt-2 ${profile.banners[i] ? '' : 'hidden'}">
                    <img class="banner-preview w-full aspect-[16/9] object-cover rounded border" src="${profile.banners[i] || ''}">
                    <button class="remove-banner mt-2 text-red-500 text-sm" data-index="${i}">Remover</button>
                </div>
            `;
            bannersContainer.appendChild(div);
        }

        document.querySelectorAll('.banner-input').forEach(input => {
            input.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.index);
                const file = e.target.files[0];
                if (file) {
                    bannerFiles[idx] = file;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const container = input.closest('.bg-gray-50').querySelector('.banner-preview-container');
                        const preview = container.querySelector('.banner-preview');
                        preview.src = e.target.result;
                        container.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        document.querySelectorAll('.remove-banner').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.index);
                bannerFiles[idx] = null;
                profile.banners[idx] = null;
                const container = btn.closest('.banner-preview-container');
                container.classList.add('hidden');
                const preview = container.querySelector('.banner-preview');
                preview.src = '';
            });
        });
    }

    // Modal de taxas
    for (let km = 1; km <= 10; km++) {
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center';
        div.innerHTML = `
            <span>Até ${km} KM</span>
            <input type="number" step="0.01" id="rate-${km}" class="border rounded p-2 w-32" placeholder="0,00">
        `;
        ratesContainer.appendChild(div);
    }

    openDeliveryModalBtn.addEventListener('click', () => {
        for (let km = 1; km <= 10; km++) {
            const input = document.getElementById(`rate-${km}`);
            input.value = profile.deliveryRates[km] || '';
        }
        deliveryModal.classList.remove('hidden');
    });

    function closeModal() { deliveryModal.classList.add('hidden'); }
    closeDeliveryModalBtn.addEventListener('click', closeModal);
    cancelRatesBtn.addEventListener('click', closeModal);
    confirmRatesBtn.addEventListener('click', () => {
        for (let km = 1; km <= 10; km++) {
            const val = document.getElementById(`rate-${km}`).value;
            profile.deliveryRates[km] = val ? parseFloat(val) : 0;
        }
        closeModal();
        showMessage('Taxas salvas. Clique em Salvar Perfil para persistir.', 'success');
    });

    // Salvar
    saveBtn.addEventListener('click', async () => {
        showMessage('Salvando...', 'success');
        
        let logoUrl = profile.logo;
        if (logoFile) {
            if (profile.logo) await deleteObject(ref(storage, profile.logo)).catch(() => {});
            const logoRef = ref(storage, `logo/${Date.now()}_logo`);
            await uploadBytes(logoRef, logoFile);
            logoUrl = await getDownloadURL(logoRef);
        }

        const bannerUrls = [...profile.banners];
        for (let i = 0; i < 3; i++) {
            if (bannerFiles[i]) {
                if (profile.banners[i]) await deleteObject(ref(storage, profile.banners[i])).catch(() => {});
                const bannerRef = ref(storage, `banners/${Date.now()}_banner_${i}`);
                await uploadBytes(bannerRef, bannerFiles[i]);
                bannerUrls[i] = await getDownloadURL(bannerRef);
            }
        }

        // Obter coordenadas do endereço se não tiver
        let latitude = parseFloat(restaurantLat.value);
        let longitude = parseFloat(restaurantLng.value);
        
        if ((!latitude || isNaN(latitude)) && restaurantAddress.value) {
            const coords = await buscarCoordenadasPorEndereco(restaurantAddress.value);
            if (coords) {
                latitude = coords.lat;
                longitude = coords.lng;
            }
        }

        const data = {
            logo: logoUrl,
            name: restaurantName.value,
            description: restaurantDescription.value,
            phone: restaurantPhone.value,
            cep: restaurantCep.value,
            address: restaurantAddress.value,
            email: restaurantEmail.value,
            openTime: openTime.value,
            closeTime: closeTime.value,
            banners: bannerUrls,
            deliveryRates: profile.deliveryRates,
            latitude: latitude || null,
            longitude: longitude || null,
            show: {
                name: showNameToggle.checked,
                description: showDescToggle.checked,
                phone: showPhoneToggle.checked,
                address: showAddressToggle.checked,
                email: showEmailToggle.checked,
                hours: showHoursToggle.checked
            },
            updatedAt: new Date()
        };

        await setDoc(doc(db, COLLECTIONS.RESTAURANT_PROFILE, 'main'), data);
        showMessage('Perfil salvo com sucesso!', 'success');
        
        // Reset files
        logoFile = null;
        bannerFiles = [null, null, null];
        profile = data;
    });

    logoInput.addEventListener('change', (e) => {
        logoFile = e.target.files[0];
        if (logoFile) {
            const reader = new FileReader();
            reader.onload = (e) => {
                logoPreview.src = e.target.result;
                logoPreviewContainer.classList.remove('hidden');
            };
            reader.readAsDataURL(logoFile);
        }
    });
</script>
</body>
</html>
